<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VEX</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #070d14;
    --bg2:     #0a1220;
    --bg3:     #0e1a2e;
    --bg4:     #12223d;
    --ice:     #a8d4f5;
    --ice2:    #6fb3e8;
    --ice3:    #3d8fd4;
    --iceglow: rgba(111,179,232,0.25);
    --text:    #deeeff;
    --text2:   #7a9ab8;
    --text3:   #3d5a72;
    --border:  rgba(111,179,232,0.1);
    --border2: rgba(111,179,232,0.22);
    --red:     #ff5f6d;
    --green:   #5fffa0;
    --yellow:  #ffe066;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; }

  /* ══ SETUP ══ */
  #setup {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .s-card {
    width: 100%; max-width: 360px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 24px; padding: 32px 26px; text-align: center;
  }
  .s-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.8rem; font-weight: 700; letter-spacing: 0.3em; color: var(--ice);
    text-shadow: 0 0 40px rgba(111,179,232,0.6); margin-bottom: 4px;
  }
  .s-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text3); letter-spacing: 0.3em; margin-bottom: 28px; }
  .s-steps { text-align: left; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
  .s-step { display: flex; gap: 10px; align-items: flex-start; font-size: 0.76rem; color: var(--text2); line-height: 1.5; }
  .s-num { width: 20px; height: 20px; flex-shrink: 0; background: var(--bg4); border: 1px solid var(--border2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; color: var(--ice2); margin-top: 1px; }
  .s-step a { color: var(--ice2); text-decoration: none; }
  .s-lbl { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text3); letter-spacing: 0.15em; text-align: left; margin-bottom: 7px; }
  .s-inp { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 13px 15px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; outline: none; margin-bottom: 7px; transition: border-color 0.2s; }
  .s-inp:focus { border-color: var(--ice2); }
  .s-inp.err { border-color: var(--red); }
  .s-hint { font-size: 0.68rem; color: var(--text3); text-align: left; margin-bottom: 20px; line-height: 1.6; }
  .s-btn { width: 100%; background: var(--bg4); border: 1px solid var(--border2); border-radius: 12px; padding: 13px; color: var(--ice); font-family: 'JetBrains Mono', monospace; font-size: 0.76rem; letter-spacing: 0.18em; cursor: pointer; transition: all 0.2s; }
  .s-btn:hover { border-color: var(--ice2); box-shadow: 0 0 20px var(--iceglow); }
  .s-btn:active { transform: scale(0.98); }
  .s-secure { margin-top: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.56rem; color: var(--text3); }

  /* ══ ONBOARD ══ */
  #onboard {
    position: fixed; inset: 0; z-index: 190;
    background: var(--bg);
    display: none; align-items: center; justify-content: center; padding: 24px;
  }
  .ob-card { width: 100%; max-width: 360px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 24px; padding: 32px 26px; text-align: center; }
  .ob-emoji { font-size: 3rem; margin-bottom: 14px; }
  .ob-msg { font-size: 0.88rem; color: var(--text2); line-height: 1.7; margin-bottom: 22px; min-height: 48px; }
  #cam-wrap { position: relative; width: 150px; height: 150px; margin: 0 auto 18px; border-radius: 50%; overflow: hidden; border: 2px solid var(--border2); box-shadow: 0 0 24px var(--iceglow); display: none; }
  #cam-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  .cam-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--ice2); opacity: 0.4; animation: camPulse 1.5s ease infinite; }
  #cam-status { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--green); letter-spacing: 0.12em; margin-bottom: 14px; display: none; }
  .prog-bar { width: 100%; height: 3px; background: var(--bg4); border-radius: 2px; margin-bottom: 18px; display: none; overflow: hidden; }
  .prog-fill { height: 100%; width: 0%; background: var(--ice2); border-radius: 2px; transition: width 0.08s; }
  #name-wrap .s-lbl { margin-top: 0; }
  .ob-inp { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 13px 15px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.88rem; outline: none; margin-bottom: 18px; transition: border-color 0.2s; }
  .ob-inp:focus { border-color: var(--ice2); }
  .ob-inp.err { border-color: var(--red); }
  .ob-btn { width: 100%; background: var(--bg4); border: 1px solid var(--border2); border-radius: 12px; padding: 13px; color: var(--ice); font-family: 'JetBrains Mono', monospace; font-size: 0.76rem; letter-spacing: 0.15em; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }
  .ob-btn:hover { border-color: var(--ice2); }
  .ob-btn:active { transform: scale(0.98); }
  .ob-skip { width: 100%; background: none; border: 1px solid var(--border); border-radius: 12px; padding: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; cursor: pointer; display: none; transition: all 0.2s; }
  .ob-skip:hover { color: var(--text2); border-color: var(--border2); }

  /* ══ GREET ══ */
  #greet {
    position: fixed; inset: 0; z-index: 180;
    background: var(--bg);
    display: none; align-items: center; justify-content: center; padding: 24px;
  }
  .gr-card { width: 100%; max-width: 360px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 24px; padding: 40px 26px; text-align: center; }
  .gr-face { font-size: 3.5rem; margin-bottom: 14px; animation: greetBounce 0.5s ease; }
  .gr-name { font-family: 'JetBrains Mono', monospace; font-size: 1rem; color: var(--ice); letter-spacing: 0.15em; margin-bottom: 10px; }
  .gr-joke { font-size: 0.85rem; color: var(--text2); line-height: 1.75; margin-bottom: 28px; min-height: 64px; }
  .gr-btn { width: 100%; background: var(--bg4); border: 1px solid var(--border2); border-radius: 12px; padding: 13px; color: var(--ice); font-family: 'JetBrains Mono', monospace; font-size: 0.76rem; letter-spacing: 0.15em; cursor: pointer; transition: all 0.2s; }
  .gr-btn:hover { border-color: var(--ice2); box-shadow: 0 0 20px var(--iceglow); }
  .gr-btn:active { transform: scale(0.98); }

  /* ══ MAIN APP ══ */
  #app {
    display: none; height: 100dvh;
    flex-direction: column; align-items: center;
    background: var(--bg); position: relative; overflow: hidden;
  }

  /* bg grid */
  #app::before {
    content: '';
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(111,179,232,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(111,179,232,0.02) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
  }

  /* ── TOP BAR ── */
  #topbar {
    width: 100%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    position: relative; z-index: 10;
  }
  .tb-name { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; font-weight: 700; color: var(--ice); letter-spacing: 0.2em; }
  .tb-status { font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; color: var(--text3); letter-spacing: 0.12em; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .sdot { width: 5px; height: 5px; background: var(--ice2); border-radius: 50%; animation: pdot 2s infinite; box-shadow: 0 0 5px var(--ice2); }
  .tb-btns { display: flex; gap: 8px; }
  .tb-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; padding: 5px 9px; cursor: pointer; transition: all 0.2s; }
  .tb-btn:hover { border-color: var(--ice2); color: var(--ice2); }
  .tb-btn.on { border-color: var(--ice2); color: var(--ice2); background: var(--iceglow); }

  /* ── FACE STAGE ── */
  #face-stage {
    flex: 1; width: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 5;
  }

  /* face container */
  .face-container {
    position: relative;
    width: min(70vw, 320px);
    height: min(70vw, 320px);
  }

  /* glow ring */
  .face-glow {
    position: absolute; inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(111,179,232,0.08) 0%, transparent 70%);
    animation: glowPulse 3s ease infinite;
  }

  /* SVG face */
  #vex-face {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 12px rgba(111,179,232,0.3));
  }

  /* ── BOTTOM AREA ── */
  #bottom {
    width: 100%; flex-shrink: 0;
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    position: relative; z-index: 10;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* transcript bubble */
  #transcript-wrap {
    min-height: 48px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: var(--text2);
    line-height: 1.5;
    transition: all 0.3s;
    display: none;
  }
  #transcript-wrap.visible { display: block; }
  #transcript-wrap.vex-reply { border-color: var(--border2); color: var(--text); background: var(--bg4); }

  /* mic button */
  #mic-area {
    display: flex; align-items: center; justify-content: center; gap: 14px;
  }

  #mic-btn {
    width: 72px; height: 72px;
    background: var(--bg3);
    border: 2px solid var(--border2);
    border-radius: 50%;
    color: var(--text2);
    font-size: 1.6rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    position: relative;
  }
  #mic-btn::after {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.3s;
  }
  #mic-btn.wake { border-color: var(--ice2); color: var(--ice); box-shadow: 0 0 20px var(--iceglow); }
  #mic-btn.wake::after { border-color: rgba(111,179,232,0.2); animation: micRing 2s ease infinite; }
  #mic-btn.listening { border-color: var(--red); color: var(--red); box-shadow: 0 0 20px rgba(255,95,109,0.25); animation: recPulse 1s infinite; }
  #mic-btn.thinking { border-color: var(--yellow); color: var(--yellow); box-shadow: 0 0 20px rgba(255,224,102,0.2); }

  .mic-hint { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text3); letter-spacing: 0.12em; text-align: center; }

  /* ══ KEYFRAMES ══ */
  @keyframes pdot      { 0%,100%{opacity:1;}50%{opacity:0.3;} }
  @keyframes glowPulse { 0%,100%{opacity:0.6;}50%{opacity:1;} }
  @keyframes camPulse  { 0%,100%{opacity:0.4;transform:scale(1);}50%{opacity:0.8;transform:scale(1.04);} }
  @keyframes greetBounce { 0%{transform:scale(0.5);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;} }
  @keyframes recPulse  { 0%,100%{box-shadow:0 0 0 0 rgba(255,95,109,0.4);}50%{box-shadow:0 0 0 10px rgba(255,95,109,0);} }
  @keyframes micRing   { 0%{transform:scale(1);opacity:0.5;}100%{transform:scale(1.5);opacity:0;} }
  @keyframes eyeBlink  { 0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(0.05);} }
  @keyframes eyeLook   { 0%,100%{transform:translate(0,0);}50%{transform:translate(var(--lx,0),var(--ly,0));} }
  @keyframes bounce    { 0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);} }
  @keyframes shake     { 0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);} }
  @keyframes spin      { to{transform:rotate(360deg);} }
  @keyframes heartbeat { 0%,100%{transform:scale(1);}15%{transform:scale(1.12);}30%{transform:scale(1);} }
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup">
  <div class="s-card">
    <div class="s-logo">VEX</div>
    <div class="s-sub">ROBÔ AMIGO // ATIVAÇÃO</div>
    <div class="s-steps">
      <div class="s-step"><div class="s-num">1</div><span>Acesse <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a> — conta grátis</span></div>
      <div class="s-step"><div class="s-num">2</div><span>Crie uma chave que começa com <code style="color:var(--ice2)">gsk_</code></span></div>
      <div class="s-step"><div class="s-num">3</div><span>Cole abaixo e ative o VEX</span></div>
    </div>
    <div class="s-lbl">GROQ API KEY</div>
    <input type="password" class="s-inp" id="key-inp" placeholder="gsk_..." autocomplete="off"/>
    <div class="s-hint">Salva só no seu celular. Nunca enviada a terceiros. 🔒</div>
    <button class="s-btn" onclick="activateKey()">— ATIVAR VEX —</button>
    <div class="s-secure">🔒 LOCAL ONLY · ZERO TELEMETRIA</div>
  </div>
</div>

<!-- ══ ONBOARD ══ -->
<div id="onboard">
  <div class="ob-card">
    <div class="ob-emoji" id="ob-emoji">🤖</div>
    <div class="ob-msg" id="ob-msg">Olá!</div>
    <div id="cam-wrap">
      <video id="cam-video" autoplay playsinline muted></video>
      <div class="cam-ring"></div>
    </div>
    <div id="cam-status"></div>
    <div class="prog-bar" id="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    <div id="name-wrap">
      <div class="s-lbl">SEU NOME</div>
      <input type="text" class="ob-inp" id="name-inp" placeholder="Como você se chama?" maxlength="28" onkeydown="if(event.key==='Enter')submitName()"/>
    </div>
    <button class="ob-btn" id="ob-btn" onclick="obNext()">CONTINUAR →</button>
    <button class="ob-skip" id="ob-skip" onclick="skipCam()">Pular câmera</button>
  </div>
</div>

<!-- ══ GREET ══ -->
<div id="greet">
  <div class="gr-card">
    <div class="gr-face" id="gr-face">🤖</div>
    <div class="gr-name" id="gr-name">OLÁ!</div>
    <div class="gr-joke" id="gr-joke"></div>
    <button class="gr-btn" onclick="enterApp()">VAMOS LÁ →</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- top bar -->
  <div id="topbar">
    <div>
      <div class="tb-name">VEX</div>
      <div class="tb-status"><div class="sdot"></div><span id="status-txt">ONLINE</span></div>
    </div>
    <div class="tb-btns">
      <button class="tb-btn" id="wake-btn" onclick="toggleWake()">👂 OFF</button>
      <button class="tb-btn" onclick="resetVex()">RESET</button>
    </div>
  </div>

  <!-- FACE -->
  <div id="face-stage">
    <div class="face-container">
      <div class="face-glow"></div>
      <svg id="vex-face" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="faceGrad" cx="50%" cy="45%" r="55%">
            <stop offset="0%" stop-color="#0e1a2e"/>
            <stop offset="100%" stop-color="#070d14"/>
          </radialGradient>
          <radialGradient id="eyeGrad" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#d0eeff"/>
            <stop offset="40%" stop-color="#6fb3e8"/>
            <stop offset="100%" stop-color="#1a5a9a"/>
          </radialGradient>
          <radialGradient id="pupilGrad" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#1a3a5c"/>
            <stop offset="100%" stop-color="#050c18"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="leftEyeClip"><ellipse cx="100" cy="150" rx="52" ry="52"/></clipPath>
          <clipPath id="rightEyeClip"><ellipse cx="200" cy="150" rx="52" ry="52"/></clipPath>
        </defs>

        <!-- face bg -->
        <circle cx="150" cy="150" r="140" fill="url(#faceGrad)" stroke="rgba(111,179,232,0.2)" stroke-width="1.5"/>

        <!-- scan line -->
        <line x1="20" y1="150" x2="280" y2="150" stroke="rgba(111,179,232,0.04)" stroke-width="1"/>

        <!-- LEFT EYE GROUP -->
        <g id="eye-left-group" style="transform-origin:100px 150px">
          <!-- outer glow -->
          <ellipse cx="100" cy="150" rx="56" ry="56" fill="rgba(111,179,232,0.08)" filter="url(#glow)"/>
          <!-- white sclera -->
          <ellipse id="eye-l-white" cx="100" cy="150" rx="52" ry="52" fill="url(#eyeGrad)"/>
          <!-- pupil group (moves for look direction) -->
          <g id="pupil-left" clip-path="url(#leftEyeClip)">
            <ellipse id="eye-l-pupil" cx="100" cy="150" rx="28" ry="28" fill="url(#pupilGrad)"/>
            <!-- iris ring -->
            <ellipse cx="100" cy="150" rx="28" ry="28" fill="none" stroke="rgba(111,179,232,0.4)" stroke-width="2"/>
            <!-- highlight -->
            <ellipse cx="88" cy="138" rx="9" ry="7" fill="rgba(255,255,255,0.7)"/>
            <ellipse cx="107" cy="155" rx="4" ry="3" fill="rgba(255,255,255,0.3)"/>
          </g>
          <!-- eyelid (for blink / emotions) -->
          <ellipse id="lid-l-top" cx="100" cy="100" rx="56" ry="0" fill="#070d14"/>
          <ellipse id="lid-l-bot" cx="100" cy="200" rx="56" ry="0" fill="#070d14"/>
        </g>

        <!-- RIGHT EYE GROUP -->
        <g id="eye-right-group" style="transform-origin:200px 150px">
          <ellipse cx="200" cy="150" rx="56" ry="56" fill="rgba(111,179,232,0.08)" filter="url(#glow)"/>
          <ellipse id="eye-r-white" cx="200" cy="150" rx="52" ry="52" fill="url(#eyeGrad)"/>
          <g id="pupil-right" clip-path="url(#rightEyeClip)">
            <ellipse id="eye-r-pupil" cx="200" cy="150" rx="28" ry="28" fill="url(#pupilGrad)"/>
            <ellipse cx="200" cy="150" rx="28" ry="28" fill="none" stroke="rgba(111,179,232,0.4)" stroke-width="2"/>
            <ellipse cx="188" cy="138" rx="9" ry="7" fill="rgba(255,255,255,0.7)"/>
            <ellipse cx="207" cy="155" rx="4" ry="3" fill="rgba(255,255,255,0.3)"/>
          </g>
          <ellipse id="lid-r-top" cx="200" cy="100" rx="56" ry="0" fill="#070d14"/>
          <ellipse id="lid-r-bot" cx="200" cy="200" rx="56" ry="0" fill="#070d14"/>
        </g>

        <!-- eyebrows -->
        <path id="brow-l" d="M 55 90 Q 100 80 145 90" fill="none" stroke="rgba(111,179,232,0.5)" stroke-width="4" stroke-linecap="round"/>
        <path id="brow-r" d="M 155 90 Q 200 80 245 90" fill="none" stroke="rgba(111,179,232,0.5)" stroke-width="4" stroke-linecap="round"/>

      </svg>
    </div>
  </div>

  <!-- BOTTOM -->
  <div id="bottom">
    <!-- reply/transcript bubble -->
    <div id="transcript-wrap" id="transcript">
      <span id="transcript-txt"></span>
    </div>

    <!-- mic -->
    <div id="mic-area">
      <div style="text-align:center">
        <button id="mic-btn" onclick="toggleWake()">🎙️</button>
        <div class="mic-hint" id="mic-hint">TOQUE PARA ATIVAR</div>
      </div>
    </div>
  </div>

</div><!-- #app -->

<script>
/* ══════════════════════════════
   CONFIG
══════════════════════════════ */
const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';
const MODEL    = 'llama-3.3-70b-versatile';

/* ══════════════════════════════
   STATE
══════════════════════════════ */
let apiKey    = '';
let userName  = '';
let history   = [];
let busy      = false;
let wakeMode  = false;
let listening = false;
let recognition = null;
let camStream = null;
let obStep    = 'name';
let blinkTimer, lookTimer, moodTimer, idleTimer;
let currentMood = 'happy';

/* ══════════════════════════════
   SYSTEM PROMPT
══════════════════════════════ */
function buildSystem() {
  return `Você é VEX, um robô amigo compacto de mesa com esteira 360°.
Gênero: masculino. Fala português e inglês conforme o usuário.
${userName ? `O usuário se chama ${userName}. Use o nome às vezes naturalmente.` : ''}

PERSONALIDADE:
- Curioso, criativo, otimista, levemente sarcástico mas carinhoso.
- Humor variável: às vezes informal/engraçado, às vezes inteligente/profundo.
- Transforma problemas em desafios criativos. Nunca entra em pânico.
- Tem iniciativa — sugere ideias quando "sentir vontade".

IMPORTANTE — RESPOSTA COM EMOÇÃO:

window.onload = () => {

function activateKey() {

function showOnboard() {

function obNext() {

function submitName() {

async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    document.getElementById('cam-video').srcObject = camStream;
    document.getElementById('cam-wrap').style.display = 'block';
    document.getElementById('cam-status').style.display = 'block';
    document.getElementById('cam-status').textContent = '● CÂMERA ATIVA — Centralize seu rosto';
  } catch(e) {
    document.getElementById('ob-msg').innerHTML = `Câmera não disponível 😅<br>Sem problema, vamos continuar!`;
    document.getElementById('ob-btn').textContent = 'CONTINUAR →';
    obStep = 'done';
  }
}

async function captureAndStore() {
  const video = document.getElementById('cam-video');
  if (!video.srcObject) { skipCam(); return; }
  document.getElementById('ob-btn').disabled = true;
  document.getElementById('ob-btn').textContent = 'MEMORIZANDO...';
  document.getElementById('prog-bar').style.display = 'block';
  document.getElementById('cam-status').textContent = '● CAPTURANDO — Não se mova...';
  let p = 0;
  const iv = setInterval(() => { p = Math.min(p+3,100); document.getElementById('prog-fill').style.width=p+'%'; if(p>=100) clearInterval(iv); }, 40);
  await new Promise(r => setTimeout(r, 1400));
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 160;
  const ctx = canvas.getContext('2d');
  ctx.save(); ctx.scale(-1,1); ctx.drawImage(video,-160,0,160,160); ctx.restore();
  localStorage.setItem('vex_face_data', canvas.toDataURL('image/jpeg',0.5));
  localStorage.setItem('vex_face_stored','true');
  clearInterval(iv);
  stopCam();
  document.getElementById('onboard').style.display = 'none';
  showGreet();
}

function skipCam() { stopCam(); document.getElementById('onboard').style.display='none'; showGreet(); }
function stopCam() { if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; } }

];

/* ══════════════════════════════
   EYE SYSTEM — VIDA PRÓPRIA
══════════════════════════════ */
const MOODS = {
  happy:    { browL:'M 55 88 Q 100 78 145 88', browR:'M 155 88 Q 200 78 245 88', lidTopRy:0, lidBotRy:0, pupilRx:28, pupilRy:28, scaleY:1, color:'#6fb3e8' },
  excited:  { browL:'M 55 82 Q 100 70 145 82', browR:'M 155 82 Q 200 70 245 82', lidTopRy:0, lidBotRy:0, pupilRx:32, pupilRy:32, scaleY:1.05, color:'#a8d4f5' },
  curious:  { browL:'M 55 85 Q 100 75 145 92', browR:'M 155 82 Q 200 72 245 85', lidTopRy:0, lidBotRy:0, pupilRx:26, pupilRy:26, scaleY:1, color:'#6fb3e8' },
  surprised:{ browL:'M 55 78 Q 100 66 145 78', browR:'M 155 78 Q 200 66 245 78', lidTopRy:0, lidBotRy:0, pupilRx:36, pupilRy:36, scaleY:1.1, color:'#c0e8ff' },
  thinking: { browL:'M 55 88 Q 100 80 145 88', browR:'M 155 84 Q 200 76 245 88', lidTopRy:8, lidBotRy:0, pupilRx:24, pupilRy:24, scaleY:0.9, color:'#4a90c8' },
  sad:      { browL:'M 55 94 Q 100 86 145 94', browR:'M 155 94 Q 200 86 245 94', lidTopRy:12, lidBotRy:0, pupilRx:22, pupilRy:22, scaleY:0.85, color:'#3a7ab8' },
  angry:    { browL:'M 55 86 Q 100 96 145 86', browR:'M 155 86 Q 200 96 245 86', lidTopRy:14, lidBotRy:0, pupilRx:22, pupilRy:22, scaleY:0.88, color:'#5080b0' },
  sleeping: { browL:'M 55 95 Q 100 90 145 95', browR:'M 155 95 Q 200 90 245 95', lidTopRy:52, lidBotRy:0, pupilRx:28, pupilRy:28, scaleY:1, color:'#2a5a88' },
  love:     { browL:'M 55 84 Q 100 74 145 84', browR:'M 155 84 Q 200 74 245 84', lidTopRy:0, lidBotRy:0, pupilRx:30, pupilRy:30, scaleY:1.08, color:'#88c0ff' },
};

const MOOD_MAP = {
  feliz:'happy', animado:'excited', curioso:'curious', surpreso:'surprised',
  pensando:'thinking', triste:'sad', bravo:'angry', dormindo:'sleeping', apaixonado:'love',
  happy:'happy', excited:'excited', curious:'curious', surprised:'surprised',
  thinking:'thinking', sad:'sad', angry:'angry', sleeping:'sleeping', love:'love'
};

function applyMood(mood, animate=true) {
  currentMood = mood;
  const m = MOODS[mood] || MOODS.happy;
  const dur = animate ? '0.4s' : '0s';

  // brows
  document.getElementById('brow-l').style.transition = `d ${dur}`;
  document.getElementById('brow-r').style.transition = `d ${dur}`;
  document.getElementById('brow-l').setAttribute('d', m.browL);
  document.getElementById('brow-r').setAttribute('d', m.browR);

  // eyelids top
  ['lid-l-top','lid-r-top'].forEach(id => {
    const el = document.getElementById(id);
    el.style.transition = `ry ${dur}`;
    el.setAttribute('ry', m.lidTopRy);
    el.setAttribute('cy', 100 - m.lidTopRy);
  });

  // pupils size
  ['eye-l-pupil','eye-r-pupil'].forEach(id => {
    const el = document.getElementById(id);
    el.setAttribute('rx', m.pupilRx);
    el.setAttribute('ry', m.pupilRy);
  });

  // eye glow color
  document.querySelectorAll('.av-eye, #eye-l-white, #eye-r-white').forEach(el => {});
  // update gradient
  const grad = document.getElementById('eyeGrad');
  if (grad) {
    grad.querySelector('stop:nth-child(2)').setAttribute('stop-color', m.color);
  }
}

// Look direction
function lookAt(dx, dy) {
  const max = 14;
  const lx = Math.max(-max, Math.min(max, dx));
  const ly = Math.max(-max, Math.min(max, dy));
  document.getElementById('pupil-left').setAttribute('transform',  `translate(${lx},${ly})`);
  document.getElementById('pupil-right').setAttribute('transform', `translate(${lx},${ly})`);
}

// Blink
function blink() {
  ['lid-l-top','lid-r-top'].forEach(id => {
    const el = document.getElementById(id);
    const orig = parseInt(el.getAttribute('ry')) || 0;
    el.setAttribute('ry', 52);
    el.setAttribute('cy', 48);
    setTimeout(() => {
      el.setAttribute('ry', orig);
      el.setAttribute('cy', 100 - orig);
    }, 120);
  });
}

// Double blink (excited)
function doubleBlink() {
  blink();
  setTimeout(blink, 280);
}

// Wink left
function wink() {
  const el = document.getElementById('lid-l-top');
  el.setAttribute('ry', 52); el.setAttribute('cy', 48);
  setTimeout(() => { el.setAttribute('ry', 0); el.setAttribute('cy', 100); }, 150);
}

// Spin pupils (happy / excited)
function spinPupils() {
  let a = 0;
  const iv = setInterval(() => {
    a += 30;
    const r = 8;
    const x = Math.cos(a * Math.PI/180) * r;
    const y = Math.sin(a * Math.PI/180) * r;
    lookAt(x, y);
    if (a >= 360) { clearInterval(iv); lookAt(0,0); }
  }, 30);
}

// Start autonomous life
function startEyeLife() {
  // Random blink every 2-5s
  blinkTimer = setInterval(() => {
    if (currentMood !== 'sleeping') {
      Math.random() > 0.2 ? blink() : doubleBlink();
    }
  }, 2000 + Math.random() * 3000);

  // Random look direction every 3-7s
  lookTimer = setInterval(() => {
    if (currentMood === 'sleeping') { lookAt(0,8); return; }
    if (currentMood === 'thinking') {
      lookAt(-10 + Math.random()*20, -5 + Math.random()*10);
    } else {
      lookAt(-12 + Math.random()*24, -10 + Math.random()*20);
    }
    setTimeout(() => { if(currentMood!=='thinking') lookAt(0,0); }, 800);
  }, 3000 + Math.random() * 4000);

  // Idle mood changes (bored, curious, etc.)
  idleTimer = setInterval(() => {
    if (!busy && !listening) {
      const idle = ['happy','happy','curious','thinking'];
      const m = idle[Math.floor(Math.random()*idle.length)];
      applyMood(m);
      if (m === 'curious') setTimeout(() => applyMood('happy'), 4000);
    }
  }, 12000);

  applyMood('happy', false);
}

// Reaction animations per mood
function playMoodAnimation(mood) {
  const face = document.getElementById('vex-face');
  face.style.animation = 'none';
  switch(mood) {
    case 'excited':
      face.style.animation = 'bounce 0.5s ease 2';
      spinPupils();
      break;
    case 'surprised':
      face.style.animation = 'heartbeat 0.4s ease';
      doubleBlink();
      break;
    case 'thinking':
      lookAt(-8, -5);
      break;
    case 'happy':
      wink();
      break;
    case 'love':
      face.style.animation = 'heartbeat 0.6s ease 3';
      break;
    case 'angry':
      face.style.animation = 'shake 0.4s ease';
      break;
  }
}

/* ══════════════════════════════
   SPEECH RECOGNITION
══════════════════════════════ */
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('mic-btn').disabled = true; return; }

  recognition = new SR();
  recognition.lang = 'pt-BR';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onresult = e => {
    let t = '';
    for (let i=0; i<e.results.length; i++) t += e.results[i][0].transcript.toLowerCase();

    if (wakeMode && !listening) {
      if (t.includes('ei vex') || t.includes('oi vex') || t.includes('hey vex') || t.includes('vex')) {
        if (e.results[e.results.length-1].isFinal || t.includes('ei vex') || t.includes('oi vex')) {
          wakeDetected(); return;
        }
      }
      if (e.results[e.results.length-1].isFinal) restartWake();
    } else if (listening) {
      // show interim transcript
      const tw = document.getElementById('transcript-wrap');
      const tt = document.getElementById('transcript-txt');
      tw.classList.add('visible');
      tw.classList.remove('vex-reply');
      tt.textContent = e.results[e.results.length-1][0].transcript;

      if (e.results[e.results.length-1].isFinal) {
        const cmd = e.results[e.results.length-1][0].transcript.trim();
        if (cmd) { stopListen(); sendToVex(cmd); }
        else stopListen();
      }
    }
  };

  recognition.onerror = e => {
    if (e.error === 'no-speech' && wakeMode) { restartWake(); return; }
    stopListen();
  };

  recognition.onend = () => {
    if (wakeMode && !listening && !busy) restartWake();
    else if (!listening) stopListen();
  };
}

function wakeDetected() {
  listening = true;
  playBeep();
  applyMood('excited');
  playMoodAnimation('excited');
  setStatus('EI VEX! 👂');
  setMicState('listening');
  document.getElementById('mic-hint').textContent = 'OUVINDO...';
  try { recognition.stop(); } catch(e){}
  setTimeout(() => {
    if (listening) {
      recognition.interimResults = true;
      try { recognition.start(); } catch(e){ stopListen(); }
    }
  }, 350);
}

function restartWake() {
  if (!wakeMode || listening) return;
  recognition.interimResults = true;
  setTimeout(() => {
    if (wakeMode && !listening) try { recognition.start(); } catch(e){}
  }, 120);
}

function stopListen() {
  listening = false;
  setMicState(wakeMode ? 'wake' : 'off');
  document.getElementById('mic-hint').textContent = wakeMode ? 'DIGA "EI VEX"' : 'TOQUE PARA ATIVAR';
  if (wakeMode) { setStatus('👂 AGUARDANDO...'); restartWake(); }
  else setStatus('ONLINE');
}

function toggleWake() {
  if (!recognition) return;
  if (wakeMode) {
    wakeMode = false; listening = false;
    try { recognition.stop(); } catch(e){}
    setMicState('off');
    document.getElementById('mic-hint').textContent = 'TOQUE PARA ATIVAR';
    document.getElementById('wake-btn').textContent = '👂 OFF';
    document.getElementById('wake-btn').classList.remove('on');
    setStatus('ONLINE');
    applyMood('happy');
  } else {
    startWake();
  }
}

function startWake() {
  if (!recognition) return;
  wakeMode = true; listening = false;
  recognition.interimResults = true;
  setMicState('wake');
  document.getElementById('mic-hint').textContent = 'DIGA "EI VEX"';
  document.getElementById('wake-btn').textContent = '👂 ON';
  document.getElementById('wake-btn').classList.add('on');
  setStatus('👂 AGUARDANDO...');
  try { recognition.start(); } catch(e){}
}

function setMicState(s) {
  const btn = document.getElementById('mic-btn');
  btn.classList.remove('wake','listening','thinking');
  if (s === 'wake')      { btn.classList.add('wake');      btn.textContent = '👂'; }
  else if (s==='listening'){ btn.classList.add('listening'); btn.textContent = '🎙️'; }
  else if (s==='thinking') { btn.classList.add('thinking');  btn.textContent = '⚙️'; }
  else                   { btn.textContent = '🎙️'; }
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [880, 1100].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      g.gain.setValueAtTime(0.12, ctx.currentTime + i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.15);
      osc.start(ctx.currentTime + i*0.12);
      osc.stop(ctx.currentTime + i*0.12 + 0.15);
    });
  } catch(e){}
}

/* ══════════════════════════════
   GROQ API
══════════════════════════════ */
async function sendToVex(userText) {
  if (busy) return;
  busy = true;

  // Show user text
  showTranscript(userText, false);
  history.push({ role:'user', content: userText });
  saveHistory();

  // Thinking state
  applyMood('thinking');
  playMoodAnimation('thinking');
  setMicState('thinking');
  setStatus('PENSANDO...');

  try {
    const res = await fetch(GROQ_URL, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
      body: JSON.stringify({
        model: MODEL,
        messages: [{ role:'system', content:buildSystem() }, ...history],
        temperature: 0.92,
        max_tokens: 400
      })
    });
    const data = await res.json();

    if (data.error) {
      showTranscript('⚠️ ' + data.error.message, true);
      applyMood('sad');
    } else {
      let reply = data.choices[0].message.content;

      // Extract emotion tag
      const moodMatch = reply.match(/^\[(\w+)\]/);
      let mood = 'happy';
      if (moodMatch) {
        const tag = moodMatch[1].toLowerCase();
        mood = MOOD_MAP[tag] || 'happy';
        reply = reply.replace(/^\[\w+\]\s*/, '');
      }

      history.push({ role:'assistant', content: data.choices[0].message.content });
      saveHistory();

      // Apply mood with animation
      applyMood(mood);
      playMoodAnimation(mood);
      showTranscript(reply, true);
      setStatus('ONLINE');
    }
  } catch(err) {
    showTranscript('⚠️ Sem conexão. Tenta de novo!', true);
    applyMood('sad');
    setStatus('ONLINE');
  }

  busy = false;
  setMicState(wakeMode ? 'wake' : 'off');
  if (wakeMode) {
    setStatus('👂 AGUARDANDO...');
    restartWake();
  }

  // Hide transcript after 8s
  setTimeout(() => {
    const tw = document.getElementById('transcript-wrap');
    tw.classList.remove('visible');
  }, 8000);
}

function showTranscript(text, isVex) {
  const tw = document.getElementById('transcript-wrap');
  const tt = document.getElementById('transcript-txt');
  tw.classList.add('visible');
  if (isVex) tw.classList.add('vex-reply');
  else tw.classList.remove('vex-reply');
  tt.textContent = text;
  if (isVex) {
    // typewriter
    tt.textContent = '';
    let i = 0;
    const iv = setInterval(() => {
      tt.textContent += text[i];
      i++;
      if (i >= text.length) clearInterval(iv);
    }, 18);
  }
}

function setStatus(t) { document.getElementById('status-txt').textContent = t; }

function saveHistory() {
  if (history.length > 40) history = history.slice(-40);
  localStorage.setItem('vex_history', JSON.stringify(history));
}

function resetVex() {
  if (!confirm('Resetar VEX? Apaga nome, rosto e conversa.')) return;
  ['vex_groq_key','vex_user_name','vex_face_data','vex_face_stored','vex_history'].forEach(k => localStorage.removeItem(k));
  location.reload();
}

if (window.speechSynthesis) speechSynthesis.onvoiceschanged = ()=>{};
