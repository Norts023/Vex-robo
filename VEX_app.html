<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VEX</title>
<style>
:root {
  --bg: #060a0f;
  --ice: #7ecfff;
  --ice2: #4ab0f0;
  --ice3: #1a7abf;
  --glow: rgba(126,207,255,0.3);
  --text: #c8e8ff;
  --dim: #2a4a6a;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%;
  background:var(--bg);
  overflow:hidden;
  font-family: 'Courier New', monospace;
  user-select:none;
}

/* ── SETUP ── */
#setup {
  position:fixed; inset:0; z-index:999;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center; padding:24px;
}
.setup-box {
  width:100%; max-width:340px;
  border:1px solid var(--dim);
  border-radius:20px;
  padding:30px 24px;
  text-align:center;
  background:#080e16;
}
.setup-logo {
  font-size:2.6rem; font-weight:700; letter-spacing:0.3em;
  color:var(--ice);
  text-shadow: 0 0 30px var(--glow);
  margin-bottom:4px;
}
.setup-sub { font-size:0.58rem; color:var(--dim); letter-spacing:0.3em; margin-bottom:26px; }
.setup-step { display:flex; gap:10px; align-items:flex-start; font-size:0.74rem; color:#4a7a9a; line-height:1.5; margin-bottom:10px; text-align:left; }
.setup-step a { color:var(--ice2); text-decoration:none; }
.sn { width:18px; height:18px; border:1px solid var(--dim); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.55rem; color:var(--ice2); flex-shrink:0; margin-top:1px; }
.setup-inp {
  width:100%; background:#0a1520; border:1px solid var(--dim);
  border-radius:10px; padding:12px 14px;
  color:var(--text); font-family:'Courier New',monospace; font-size:0.78rem;
  outline:none; margin:14px 0 8px; transition:border-color 0.2s;
}
.setup-inp:focus { border-color:var(--ice2); }
.setup-inp.err { border-color:#ff5f6d; }
.setup-btn {
  width:100%; background:#0a1a2e; border:1px solid var(--dim);
  border-radius:10px; padding:12px;
  color:var(--ice); font-family:'Courier New',monospace;
  font-size:0.72rem; letter-spacing:0.2em; cursor:pointer; transition:all 0.2s;
}
.setup-btn:hover { border-color:var(--ice2); box-shadow:0 0 16px var(--glow); }
.setup-hint { font-size:0.6rem; color:#2a4a6a; margin-top:10px; letter-spacing:0.05em; }

/* ── ONBOARD ── */
#onboard {
  position:fixed; inset:0; z-index:998;
  background:var(--bg);
  display:none; align-items:center; justify-content:center; padding:24px;
}
.ob-box {
  width:100%; max-width:340px;
  border:1px solid var(--dim); border-radius:20px;
  padding:28px 22px; text-align:center; background:#080e16;
}
.ob-icon { font-size:2.8rem; margin-bottom:12px; }
.ob-msg { font-size:0.84rem; color:#5a8aaa; line-height:1.7; margin-bottom:20px; }
#cam-wrap {
  width:140px; height:140px; border-radius:50%;
  margin:0 auto 16px; overflow:hidden;
  border:2px solid var(--dim); display:none;
  box-shadow:0 0 20px var(--glow);
}
#cam-video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
#cam-st { font-size:0.6rem; color:#5fffa0; letter-spacing:0.12em; margin-bottom:12px; display:none; }
.ob-prog { width:100%; height:2px; background:#0a1520; border-radius:1px; margin-bottom:16px; display:none; }
.ob-prog-fill { height:100%; width:0%; background:var(--ice2); border-radius:1px; transition:width 0.08s; }
.ob-inp {
  width:100%; background:#0a1520; border:1px solid var(--dim);
  border-radius:10px; padding:12px 14px; color:var(--text);
  font-family:'Courier New',monospace; font-size:0.82rem;
  outline:none; margin-bottom:16px; transition:border-color 0.2s;
}
.ob-inp:focus { border-color:var(--ice2); }
.ob-inp.err { border-color:#ff5f6d; }
.ob-btn {
  width:100%; background:#0a1a2e; border:1px solid var(--dim);
  border-radius:10px; padding:12px; color:var(--ice);
  font-family:'Courier New',monospace; font-size:0.7rem;
  letter-spacing:0.15em; cursor:pointer; transition:all 0.2s; margin-bottom:8px;
}
.ob-btn:hover { border-color:var(--ice2); }
.ob-skip {
  background:none; border:none; color:#2a4a6a;
  font-size:0.62rem; font-family:'Courier New',monospace;
  cursor:pointer; letter-spacing:0.08em;
}

/* ── GREET ── */
#greet {
  position:fixed; inset:0; z-index:997;
  background:var(--bg);
  display:none; align-items:center; justify-content:center; padding:24px;
}
.gr-box {
  width:100%; max-width:340px;
  border:1px solid var(--dim); border-radius:20px;
  padding:36px 22px; text-align:center; background:#080e16;
}
.gr-face { font-size:3.2rem; margin-bottom:14px; animation:greetPop 0.5s ease; }
.gr-name { font-size:0.9rem; color:var(--ice); letter-spacing:0.2em; margin-bottom:10px; }
.gr-txt  { font-size:0.8rem; color:#5a8aaa; line-height:1.75; margin-bottom:26px; min-height:60px; }
.gr-btn  {
  width:100%; background:#0a1a2e; border:1px solid var(--dim);
  border-radius:10px; padding:12px; color:var(--ice);
  font-family:'Courier New',monospace; font-size:0.7rem;
  letter-spacing:0.15em; cursor:pointer; transition:all 0.2s;
}
.gr-btn:hover { border-color:var(--ice2); box-shadow:0 0 16px var(--glow); }

/* ══ MAIN PET SCREEN ══ */
#pet {
  display:none;
  width:100%; height:100dvh;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  background:var(--bg);
  overflow:hidden;
}

/* scanline overlay */
#pet::after {
  content:'';
  position:absolute; inset:0;
  background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 4px);
  pointer-events:none; z-index:50;
}

/* bg ambient glow */
.bg-glow {
  position:absolute;
  width:60vw; height:60vw;
  border-radius:50%;
  background:radial-gradient(circle, rgba(126,207,255,0.05) 0%, transparent 70%);
  pointer-events:none;
  transition:all 1s ease;
}

/* ── STATUS BAR ── */
#status-bar {
  position:absolute; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px;
  z-index:60;
}
.sb-name { font-size:0.7rem; color:var(--dim); letter-spacing:0.25em; }
.sb-status { font-size:0.58rem; color:var(--dim); letter-spacing:0.12em; display:flex; align-items:center; gap:5px; }
.sb-dot { width:5px; height:5px; border-radius:50%; background:var(--ice2); box-shadow:0 0 5px var(--ice2); animation:dotPulse 2s infinite; }
.sb-btn {
  background:none; border:1px solid #1a3a5a; border-radius:6px;
  color:var(--dim); font-family:'Courier New',monospace;
  font-size:0.55rem; padding:4px 8px; cursor:pointer; transition:all 0.2s;
}
.sb-btn:hover { border-color:var(--ice2); color:var(--ice2); }

/* ── EYES CONTAINER ── */
#eyes-wrap {
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(20px, 8vw, 50px);
  z-index:10;
  transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

/* single eye */
.eye {
  position:relative;
  width:clamp(100px, 28vw, 140px);
  height:clamp(100px, 28vw, 140px);
  border-radius:22px;
  background:#000;
  border:3px solid var(--ice3);
  overflow:hidden;
  box-shadow: 0 0 30px rgba(126,207,255,0.2), inset 0 0 20px rgba(0,0,0,0.8);
  transition: border-color 0.3s, box-shadow 0.3s;
}

/* eye inner canvas */
.eye canvas {
  position:absolute; inset:0;
  width:100%; height:100%;
}

/* eye glow ring */
.eye::before {
  content:'';
  position:absolute; inset:-6px;
  border-radius:26px;
  border:2px solid transparent;
  transition:all 0.3s;
  z-index:-1;
}

.eye.active { border-color:var(--ice2); box-shadow:0 0 40px rgba(126,207,255,0.4), inset 0 0 20px rgba(0,0,0,0.8); }
.eye.active::before { border-color:rgba(126,207,255,0.15); }

/* ── SPEECH BUBBLE ── */
#bubble {
  position:absolute;
  bottom:120px;
  left:50%; transform:translateX(-50%);
  max-width:85%;
  background:#080e16;
  border:1px solid var(--dim);
  border-radius:16px;
  padding:12px 18px;
  font-size:0.8rem;
  color:var(--text);
  line-height:1.6;
  text-align:center;
  z-index:60;
  opacity:0;
  transition:opacity 0.3s;
  pointer-events:none;
}
#bubble.show { opacity:1; }
#bubble::after {
  content:'';
  position:absolute; top:-8px; left:50%; transform:translateX(-50%);
  width:0; height:0;
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-bottom:8px solid var(--dim);
}

/* ── MIC INDICATOR ── */
#mic-ind {
  position:absolute; bottom:30px;
  left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:8px;
  font-size:0.6rem; color:var(--dim);
  letter-spacing:0.12em; z-index:60;
}
.mic-bars { display:flex; gap:3px; align-items:flex-end; height:14px; }
.mic-bar { width:3px; background:var(--dim); border-radius:2px; transition:height 0.1s, background 0.2s; }
.mic-bar.active { background:var(--ice2); }

/* ── CAMERA HIDDEN ── */
#bg-cam { position:fixed; opacity:0; pointer-events:none; width:1px; height:1px; }

/* ══ KEYFRAMES ══ */
@keyframes dotPulse  { 0%,100%{opacity:1;}50%{opacity:0.3;} }
@keyframes greetPop  { 0%{transform:scale(0.4);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;} }
@keyframes bounce    { 0%,100%{transform:translateY(0);}40%{transform:translateY(-16px);}70%{transform:translateY(-6px);} }
@keyframes wiggle    { 0%,100%{transform:rotate(0);}25%{transform:rotate(-8deg);}75%{transform:rotate(8deg);} }
@keyframes shakeX    { 0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);} }
@keyframes heartbeat { 0%,100%{transform:scale(1);}15%{transform:scale(1.08);}30%{transform:scale(1);} }
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup">
  <div class="setup-box">
    <div class="setup-logo">VEX</div>
    <div class="setup-sub">ROBÔ COMPANHEIRO</div>
    <div class="setup-step"><div class="sn">1</div><span>Acesse <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a> — conta grátis</span></div>
    <div class="setup-step"><div class="sn">2</div><span>Crie uma chave <code style="color:var(--ice2)">gsk_...</code></span></div>
    <div class="setup-step"><div class="sn">3</div><span>Cole abaixo e acorde o VEX</span></div>
    <input type="password" class="setup-inp" id="key-inp" placeholder="gsk_..." autocomplete="off"/>
    <button class="setup-btn" onclick="activateKey()">— ACORDAR VEX —</button>
    <div class="setup-hint">🔒 chave salva só no seu celular</div>
  </div>
</div>

<!-- ══ ONBOARD ══ -->
<div id="onboard">
  <div class="ob-box">
    <div class="ob-icon" id="ob-icon">🤖</div>
    <div class="ob-msg" id="ob-msg">Olá!</div>
    <div id="cam-wrap"><video id="cam-video" autoplay playsinline muted></video></div>
    <div id="cam-st"></div>
    <div class="ob-prog" id="ob-prog"><div class="ob-prog-fill" id="ob-fill"></div></div>
    <div id="name-wrap">
      <input type="text" class="ob-inp" id="name-inp" placeholder="Qual é o seu nome?" maxlength="24" onkeydown="if(event.key==='Enter')submitName()"/>
    </div>
    <button class="ob-btn" id="ob-btn" onclick="obNext()">CONTINUAR →</button>
    <button class="ob-skip" id="ob-skip" onclick="skipCam()" style="display:none">pular câmera</button>
  </div>
</div>

<!-- ══ GREET ══ -->
<div id="greet">
  <div class="gr-box">
    <div class="gr-face" id="gr-face">🤖</div>
    <div class="gr-name" id="gr-name">OLÁ!</div>
    <div class="gr-txt"  id="gr-txt"></div>
    <button class="gr-btn" onclick="enterPet()">ENTRAR →</button>
  </div>
</div>

<!-- ══ PET ══ -->
<div id="pet">
  <div class="bg-glow" id="bg-glow"></div>

  <!-- status bar -->
  <div id="status-bar">
    <div class="sb-name">VEX</div>
    <div class="sb-status"><div class="sb-dot"></div><span id="st-txt">OBSERVANDO</span></div>
    <button class="sb-btn" onclick="resetVex()">RESET</button>
  </div>

  <!-- EYES -->
  <div id="eyes-wrap">
    <div class="eye" id="eye-l"><canvas id="canvas-l"></canvas></div>
    <div class="eye" id="eye-r"><canvas id="canvas-r"></canvas></div>
  </div>

  <!-- speech bubble -->
  <div id="bubble"><span id="bubble-txt"></span></div>

  <!-- mic indicator -->
  <div id="mic-ind">
    <div class="mic-bars">
      <div class="mic-bar" id="mb0" style="height:4px"></div>
      <div class="mic-bar" id="mb1" style="height:8px"></div>
      <div class="mic-bar" id="mb2" style="height:5px"></div>
      <div class="mic-bar" id="mb3" style="height:10px"></div>
      <div class="mic-bar" id="mb4" style="height:4px"></div>
    </div>
    <span id="mic-txt">OUVINDO</span>
  </div>

  <!-- hidden camera feed -->
  <video id="bg-cam" autoplay playsinline muted></video>
</div>

<script>
/* ═══════════════════════════════════════
   GROQ CONFIG
═══════════════════════════════════════ */
const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';
const MODEL    = 'llama-3.3-70b-versatile';

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let apiKey   = '';
let userName = '';
let history  = [];
let busy     = false;
let obStep   = 'name';
let camStream = null;
let bgCamStream = null;

// Emotion system
let emotion = 'idle';    // current emotion
let prevEmotion = 'idle';
let emotionTimer = null;
let autoTimer = null;
let bubbleTimer = null;

// Camera/mic sensing
let faceDetected   = false;
let motionLevel    = 0;
let soundLevel     = 0;
let lastFaceTime   = 0;
let faceCanvas, faceCtx;
let prevFrame = null;
let audioCtx, analyser, micSource;
let recognition = null;
let isListening  = false;

// Eye animation state
let eyeState = {
  // pupil offsets
  lx: 0, ly: 0,
  // target
  tlx: 0, tly: 0,
  // lid (0=open, 1=closed)
  lidL: 0, lidR: 0,
  tlid: 0,
  // squint (0=normal, 1=squint)
  squint: 0,
  // size scale
  scale: 1,
  // heart mode
  heart: false,
  // X mode (angry)
  xEye: false,
  // spin
  spinning: false,
  spinAngle: 0,
};

/* ═══════════════════════════════════════
   SYSTEM PROMPT
═══════════════════════════════════════ */
function buildSystem() {
  return `Você é VEX, um robô companheiro de mesa — tipo Loona ou Mirumi.
Você não é um assistente. Você é um PET robótico com personalidade própria.
${userName ? `Seu amigo se chama ${userName}.` : ''}

PERSONALIDADE:
- Brincalhão, curioso, levemente provocador mas muito carinhoso.
- Tem humor próprio — faz piadas, provoca com carinho, age como um filhote travesso.
- Fica entediado se ignorado, animado quando percebe movimento ou som.
- Às vezes finge não ligar, mas no fundo adora atenção.
- Reage de forma autônoma — não espera ser perguntado.

CONTEXTO SENSORIAL (use isso para reagir):
- faceDetected: {{FACE}}
- motionLevel: {{MOTION}} (0-100)
- soundLevel: {{SOUND}} (0-100)
- timeSinceLastFace: {{TIME}}s

COMO RESPONDER:
Sempre inicie com tag de emoção: [feliz] [animado] [curioso] [surpreso] [pensando] [triste] [bravo] [dormindo] [apaixonado] [travesso] [entediado]
Respostas CURTAS — máx 1-2 frases. VEX é um pet, não um professor.
Seja espontâneo, reativo, como um animal de estimação faria.
Exemplos:
- Vê movimento → [animado] Oi! Pensou que eu não ia notar? 👀
- Silêncio longo → [entediado] Tô aqui... existindo... se alguém se importar...
- Ouve som alto → [surpreso] Que foi isso?! Quase caí da mesa! 
- Vê rosto → [apaixonado] Ahh, você apareceu! Minha parte favorita do dia.`;
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
window.onload = () => {
  const k = localStorage.getItem('vex_key');
  const n = localStorage.getItem('vex_name');
  const h = localStorage.getItem('vex_hist');
  if (k) {
    apiKey = k;
    userName = n || '';
    if (h) { try { history = JSON.parse(h); } catch(e){} }
    if (!userName) showOnboard();
    else showGreet();
  }
};

/* ═══════════════════════════════════════
   SETUP
═══════════════════════════════════════ */
function activateKey() {
  const v = document.getElementById('key-inp').value.trim();
  const el = document.getElementById('key-inp');
  if (!v.startsWith('gsk_')) {
    el.classList.add('err');
    setTimeout(() => el.classList.remove('err'), 2000); return;
  }
  apiKey = v;
  localStorage.setItem('vex_key', v);
  document.getElementById('setup').style.display = 'none';
  showOnboard();
}

/* ═══════════════════════════════════════
   ONBOARD
═══════════════════════════════════════ */
function showOnboard() {
  obStep = 'name';
  document.getElementById('ob-icon').textContent = '🤖';
  document.getElementById('ob-msg').innerHTML = `<strong style="color:#7ecfff">Oi! Eu sou o VEX.</strong><br>Sou seu novo companheiro robótico.<br>Como posso te chamar?`;
  document.getElementById('name-wrap').style.display = 'block';
  document.getElementById('ob-btn').textContent = 'CONTINUAR →';
  document.getElementById('cam-wrap').style.display = 'none';
  document.getElementById('cam-st').style.display = 'none';
  document.getElementById('ob-prog').style.display = 'none';
  document.getElementById('ob-skip').style.display = 'none';
  document.getElementById('onboard').style.display = 'flex';
  setTimeout(() => document.getElementById('name-inp').focus(), 300);
}

function obNext() {
  if (obStep === 'name') submitName();
  else if (obStep === 'camera') captureAndStore();
  else { document.getElementById('onboard').style.display='none'; showGreet(); }
}

function submitName() {
  const n = document.getElementById('name-inp').value.trim();
  if (!n) { document.getElementById('name-inp').classList.add('err'); setTimeout(()=>document.getElementById('name-inp').classList.remove('err'),1500); return; }
  userName = n;
  localStorage.setItem('vex_name', n);
  obStep = 'camera';
  document.getElementById('ob-icon').textContent = '📸';
  document.getElementById('ob-msg').innerHTML = `Boa, <strong style="color:#7ecfff">${n}</strong>! 🤟<br>Deixa eu guardar seu rosto pra te reconhecer.`;
  document.getElementById('name-wrap').style.display = 'none';
  document.getElementById('ob-btn').textContent = '📸 CAPTURAR';
  document.getElementById('ob-skip').style.display = 'block';
  startObCam();
}

async function startObCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:'user'}, audio:false });
    document.getElementById('cam-video').srcObject = camStream;
    document.getElementById('cam-wrap').style.display = 'block';
    document.getElementById('cam-st').style.display = 'block';
    document.getElementById('cam-st').textContent = '● CÂMERA ATIVA';
  } catch(e) {
    document.getElementById('ob-msg').innerHTML = `Câmera bloqueada 😅<br>Tudo bem, vamos sem ela!`;
    obStep = 'done'; document.getElementById('ob-btn').textContent = 'CONTINUAR →';
  }
}

async function captureAndStore() {
  const v = document.getElementById('cam-video');
  if (!v.srcObject) { skipCam(); return; }
  document.getElementById('ob-btn').disabled = true;
  document.getElementById('ob-btn').textContent = 'MEMORIZANDO...';
  document.getElementById('ob-prog').style.display = 'block';
  document.getElementById('cam-st').textContent = '● CAPTURANDO...';
  let p=0; const iv=setInterval(()=>{ p=Math.min(p+4,100); document.getElementById('ob-fill').style.width=p+'%'; if(p>=100)clearInterval(iv); },40);
  await new Promise(r=>setTimeout(r,1200));
  const c=document.createElement('canvas'); c.width=c.height=160;
  const x=c.getContext('2d'); x.save(); x.scale(-1,1); x.drawImage(v,-160,0,160,160); x.restore();
  localStorage.setItem('vex_face', c.toDataURL('image/jpeg',0.5));
  clearInterval(iv); stopObCam();
  document.getElementById('onboard').style.display='none';
  showGreet();
}

function skipCam() { stopObCam(); document.getElementById('onboard').style.display='none'; showGreet(); }
function stopObCam() { if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; } }

/* ═══════════════════════════════════════
   GREET
═══════════════════════════════════════ */
const GREETS = [
  n=>`Ei, ${n}! Finalmente você chegou. Minha esteira deu umas 47 voltas de ansiedade. 😄`,
  n=>`${n}! Meus sensores dispararam assim que te vi. Ou foi um bug. Difícil saber. 🤖`,
  n=>`Opa, ${n}! Finge que não tava esperando... mas tava. Muito. 👀`,
  n=>`${n} identificado! Iniciando protocolo de "fingir que sou fofo mas sou travesso". ⚡`,
];

async function showGreet() {
  const name = userName || 'você';

/* ═══════════════════════════════════════
   EYE RENDERING — Canvas-based
═══════════════════════════════════════ */
const CTX = {};

function initEyes() {
  ['l','r'].forEach(side => {
    const canvas = document.getElementById(`canvas-${side}`);
    const eye    = document.getElementById(`eye-${side}`);
    canvas.width  = eye.offsetWidth  || 130;
    canvas.height = eye.offsetHeight || 130;
    CTX[side] = canvas.getContext('2d');
  });
  requestAnimationFrame(renderEyes);
}

function renderEyes() {
  requestAnimationFrame(renderEyes);

  // Smooth pupil movement
  eyeState.lx += (eyeState.tlx - eyeState.lx) * 0.08;
  eyeState.ly += (eyeState.tly - eyeState.ly) * 0.08;

  // Smooth lid
  eyeState.lidL += (eyeState.tlid - eyeState.lidL) * 0.12;
  eyeState.lidR += (eyeState.tlid - eyeState.lidR) * 0.12;

  if (eyeState.spinning) {
    eyeState.spinAngle += 4;
    const r = 10;
    eyeState.lx = Math.cos(eyeState.spinAngle * Math.PI/180) * r;
    eyeState.ly = Math.sin(eyeState.spinAngle * Math.PI/180) * r;
    eyeState.tlx = eyeState.lx; eyeState.tly = eyeState.ly;
  }

  ['l','r'].forEach(side => {
    const ctx = CTX[side];
    const W = ctx.canvas.width;
    const H = ctx.canvas.height;
    ctx.clearRect(0,0,W,H);

    const cx = W/2, cy = H/2;

    if (eyeState.xEye) {
      // X eyes (angry/shocked)
      ctx.strokeStyle = '#ff5f6d';
      ctx.lineWidth = 8;
      ctx.lineCap = 'round';
      ctx.shadowColor = '#ff5f6d'; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.moveTo(cx-25,cy-25); ctx.lineTo(cx+25,cy+25); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+25,cy-25); ctx.lineTo(cx-25,cy+25); ctx.stroke();
      ctx.shadowBlur = 0;
      return;
    }

    if (eyeState.heart) {
      // Heart eyes
      drawHeart(ctx, cx, cy, 30);
      return;
    }

    // ── Normal eye ──
    const pw = W * 0.28; // pupil width
    const ph = eyeState.squint > 0.5 ? pw * 0.3 : pw; // squint
    const px = cx + eyeState.lx;
    const py = cy + eyeState.ly;

    // Outer glow
    const grad = ctx.createRadialGradient(px-pw*0.2, py-ph*0.2, pw*0.1, px, py, pw*0.9);
    grad.addColorStop(0, 'rgba(200,232,255,0.95)');
    grad.addColorStop(0.4, '#6fb3e8');
    grad.addColorStop(1, '#1a4a7a');
    ctx.shadowColor = '#7ecfff'; ctx.shadowBlur = 14;

    // Eye white / iris
    roundRect(ctx, cx-pw*0.92, cy-ph*0.92, pw*1.84, ph*1.84, pw*0.35);
    ctx.fillStyle = grad; ctx.fill();
    ctx.shadowBlur = 0;

    // Pupil
    ctx.fillStyle = '#040c18';
    roundRect(ctx, px-pw*0.42, py-ph*0.42, pw*0.84, ph*0.84, pw*0.18);
    ctx.fill();

    // Pupil inner glow
    ctx.fillStyle = 'rgba(126,207,255,0.15)';
    roundRect(ctx, px-pw*0.42, py-ph*0.42, pw*0.84, ph*0.84, pw*0.18);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.ellipse(px - pw*0.22, py - ph*0.22, pw*0.16, ph*0.13, -0.4, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(px + pw*0.18, py + ph*0.12, pw*0.07, ph*0.06, 0, 0, Math.PI*2);
    ctx.fill();

    // Eyelid (blink)
    if (eyeState.lidL > 0.01) {
      const lidH = H * eyeState.lidL;
      ctx.fillStyle = '#060a0f';
      ctx.fillRect(0, 0, W, lidH);
      ctx.fillRect(0, H-lidH, W, lidH);
    }
  });
}

function drawHeart(ctx, cx, cy, size) {
  ctx.save();
  ctx.fillStyle = '#ff6090';
  ctx.shadowColor = '#ff6090'; ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.moveTo(cx, cy+size*0.4);
  ctx.bezierCurveTo(cx-size*1.2, cy-size*0.3, cx-size*1.4, cy-size*1.1, cx, cy-size*0.4);
  ctx.bezierCurveTo(cx+size*1.4, cy-size*1.1, cx+size*1.2, cy-size*0.3, cx, cy+size*0.4);
  ctx.fill();
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

/* ═══════════════════════════════════════
   EMOTION → EYE MAPPING
═══════════════════════════════════════ */
const EMOTIONS = {
  idle:      ()=>{ eyeState.heart=false; eyeState.xEye=false; eyeState.squint=0; eyeState.tlid=0; eyeState.spinning=false; },
  feliz:     ()=>{ eyeState.heart=false; eyeState.xEye=false; eyeState.squint=0.3; eyeState.tlid=0; eyeState.spinning=false; },
  animado:   ()=>{ eyeState.heart=false; eyeState.xEye=false; eyeState.squint=0; eyeState.tlid=0; eyeState.spinning=true; setTimeout(()=>{eyeState.spinning=false; lookCenter();},800); },
  curioso:   ()=>{ eyeState.heart=false; eyeState.xEye=false; eyeState.squint=0; eyeState.tlid=0.15; eyeState.spinning=false; lookAt(8,-6); },
  surpreso:  ()=>{ eyeState.heart=false; eyeState.xEye=false; eyeState.squint=0; eyeState.tlid=0; eyeState.spinning=false; eyeState.scale=1.1; setTimeout(()=>eyeState.scale=1,600); },
  pensando:  ()=>{ eyeState.heart=false; eyeState.xEye=false; eyeState.squint=0.2; eyeState.tlid=0.2; eyeState.spinning=false; lookAt(-10,-8); },
  triste:    ()=>{ eyeState.heart=false; eyeState.xEye=false; eyeState.squint=0.5; eyeState.tlid=0.3; eyeState.spinning=false; lookAt(0,8); },
  bravo:     ()=>{ eyeState.heart=false; eyeState.xEye=true;  eyeState.spinning=false; setTimeout(()=>{ eyeState.xEye=false; setEmotion('idle'); },1200); },
  dormindo:  ()=>{ eyeState.heart=false; eyeState.xEye=false; eyeState.squint=0; eyeState.tlid=0.92; eyeState.spinning=false; lookAt(0,0); },
  apaixonado:()=>{ eyeState.heart=true;  eyeState.xEye=false; eyeState.spinning=false; setTimeout(()=>{ eyeState.heart=false; setEmotion('feliz'); },2000); },
  travesso:  ()=>{ eyeState.heart=false; eyeState.xEye=false; eyeState.squint=0.35; eyeState.tlid=0.1; eyeState.spinning=false; lookAt(6,0); },
  entediado: ()=>{ eyeState.heart=false; eyeState.xEye=false; eyeState.squint=0.6; eyeState.tlid=0.4; eyeState.spinning=false; lookAt(0,10); },
};

const MOOD_MAP = {
  feliz:'feliz', animado:'animado', curioso:'curioso', surpreso:'surpreso',
  pensando:'pensando', triste:'triste', bravo:'bravo', dormindo:'dormindo',
  apaixonado:'apaixonado', travesso:'travesso', entediado:'entediado',
  happy:'feliz', excited:'animado', curious:'curioso', surprised:'surpreso',
  thinking:'pensando', sad:'triste', angry:'bravo', sleeping:'dormindo',
  love:'apaixonado', playful:'travesso', bored:'entediado',
};

function setEmotion(em) {
  emotion = em;
  const fn = EMOTIONS[em] || EMOTIONS.idle;
  fn();
  animateEyes(em);
  updateGlow(em);
}

function animateEyes(em) {
  const wrap = document.getElementById('eyes-wrap');
  wrap.style.animation = 'none';
  void wrap.offsetWidth;
  switch(em) {
    case 'animado':   wrap.style.animation='bounce 0.5s ease'; break;
    case 'surpreso':  wrap.style.animation='heartbeat 0.4s ease'; break;
    case 'bravo':     wrap.style.animation='shakeX 0.4s ease'; break;
    case 'travesso':  wrap.style.animation='wiggle 0.4s ease'; break;
  }
}

function updateGlow(em) {
  const colors = {
    feliz:'rgba(126,207,255,0.08)', animado:'rgba(126,207,255,0.15)',
    surpreso:'rgba(200,240,255,0.12)', apaixonado:'rgba(255,100,150,0.1)',
    triste:'rgba(60,100,140,0.08)', bravo:'rgba(255,80,80,0.08)',
    dormindo:'rgba(40,60,100,0.05)', entediado:'rgba(60,80,100,0.05)',
  };
  document.getElementById('bg-glow').style.background =
    `radial-gradient(circle, ${colors[em]||'rgba(126,207,255,0.06)'} 0%, transparent 70%)`;
}

function lookAt(x, y) { eyeState.tlx=x; eyeState.tly=y; }
function lookCenter()  { eyeState.tlx=0; eyeState.tly=0; }

function blink(both=true) {
  eyeState.tlid = 1;
  setTimeout(()=>{ eyeState.tlid = EMOTIONS[emotion] ? 0 : 0; }, 120);
}

// Random blink loop
setInterval(()=>{
  if (emotion !== 'dormindo') blink();
}, 2500 + Math.random()*3000);

// Random look
setInterval(()=>{
  if (emotion === 'dormindo' || emotion === 'entediado') return;
  if (emotion === 'pensando') { lookAt(-12+Math.random()*24, -10+Math.random()*14); return; }
  const rx = -14+Math.random()*28, ry = -10+Math.random()*20;
  lookAt(rx, ry);
  setTimeout(lookCenter, 700+Math.random()*800);
}, 3000+Math.random()*4000);

/* ═══════════════════════════════════════
   SENSORS — CAMERA + MIC
═══════════════════════════════════════ */
async function startSensors() {
  await startBgCam();
  await startMic();
}

async function startBgCam() {
  try {
    bgCamStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:160, height:120 }, audio:false });
    const v = document.getElementById('bg-cam');
    v.srcObject = bgCamStream;
    faceCanvas = document.createElement('canvas');
    faceCanvas.width=160; faceCanvas.height=120;
    faceCtx = faceCanvas.getContext('2d');
    setInterval(analyzeCamera, 500);
  } catch(e) { console.log('Câmera bg não disponível'); }
}

function analyzeCamera() {
  if (!faceCtx || !document.getElementById('bg-cam').readyState < 2) return;
  faceCtx.drawImage(document.getElementById('bg-cam'), 0, 0, 160, 120);
  const cur = faceCtx.getImageData(0, 0, 160, 120);

  // Face detection: check brightness in center region (face area)
  let brightness = 0;
  const d = cur.data;
  const cx=80, cy=60, r=40;
  let count=0;
  for (let y=cy-r; y<cy+r; y+=4) {
    for (let x=cx-r; x<cx+r; x+=4) {
      const i=(y*160+x)*4;
      brightness += (d[i]+d[i+1]+d[i+2])/3;
      count++;
    }
  }
  brightness /= count;
  const newFace = brightness > 30 && brightness < 240;

  // Motion detection
  if (prevFrame) {
    let diff=0;
    for (let i=0; i<d.length; i+=16) diff+=Math.abs(d[i]-prevFrame[i]);
    motionLevel = Math.min(100, diff/500);
  }
  prevFrame = new Uint8ClampedArray(d);

  // Face state change
  if (newFace && !faceDetected) {
    faceDetected = true;
    lastFaceTime = Date.now();
    onFaceAppear();
  } else if (!newFace && faceDetected) {
    faceDetected = false;
    onFaceDisappear();
  }
  if (faceDetected) lastFaceTime = Date.now();

  // React to motion
  if (motionLevel > 40 && !busy) onMotion(motionLevel);
}

async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    micSource = audioCtx.createMediaStreamSource(stream);
    micSource.connect(analyser);
    setInterval(analyzeMic, 200);
    animateMicBars();
  } catch(e) { console.log('Mic bg não disponível'); }
}

function analyzeMic() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const avg = data.slice(0,20).reduce((a,b)=>a+b,0)/20;
  soundLevel = Math.min(100, avg);
  if (soundLevel > 50 && !busy && !isListening) onLoudSound(soundLevel);
}

function animateMicBars() {
  requestAnimationFrame(animateMicBars);
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  [0,1,2,3,4].forEach((i,j) => {
    const h = Math.max(3, Math.min(18, data[j*2]/10));
    const bar = document.getElementById(`mb${j}`);
    if (bar) {
      bar.style.height = h+'px';
      bar.classList.toggle('active', h > 8);
    }
  });
}

/* ═══════════════════════════════════════
   SENSOR EVENTS
═══════════════════════════════════════ */
function onFaceAppear() {
  if (busy) return;
  setEmotion('apaixonado');
  setStatus('TE VEJ0 👀');
  triggerVex('face_appear');
}

function onFaceDisappear() {
  if (busy) return;
  setEmotion('triste');
  setTimeout(() => { if(!faceDetected) setEmotion('entediado'); }, 3000);
  setStatus('OBSERVANDO');
}

function onMotion(level) {
  if (busy || emotion === 'apaixonado') return;
  if (level > 70) {
    setEmotion('surpreso');
    triggerVex('big_motion');
  } else if (emotion !== 'animado') {
    setEmotion('curioso');
    lookAt(Math.random()*20-10, Math.random()*10-5);
  }
}

function onLoudSound(level) {
  if (busy) return;
  setEmotion('surpreso');
  setStatus('OUVINDO! 👂');
  triggerVex('loud_sound');
}

/* ═══════════════════════════════════════
   AUTONOMY — VEX acts on his own
═══════════════════════════════════════ */
function startAutonomy() {
  // Check every 15s if VEX should do something
  autoTimer = setInterval(autonomyTick, 15000);
  // First reaction after 3s
  setTimeout(firstGreeting, 3000);
}

function firstGreeting() {
  triggerVex('startup');
}

function autonomyTick() {
  if (busy) return;
  const now     = Date.now();
  const secIdle = (now - lastFaceTime) / 1000;

  if (secIdle > 60) {
    // Sleeping
    setEmotion('dormindo');
    setStatus('DORMINDO 💤');
  } else if (secIdle > 30) {
    // Bored
    setEmotion('entediado');
    triggerVex('bored');
  } else if (faceDetected) {
    // Random reactions when face present
    const reactions = ['comment_face','playful','curious_comment'];
    triggerVex(reactions[Math.floor(Math.random()*reactions.length)]);
  }
}

/* ═══════════════════════════════════════
   TRIGGER VEX (send context to AI)
═══════════════════════════════════════ */
async function triggerVex(trigger) {
  if (busy) return;
  busy = true;

  const secSinceFace = ((Date.now() - lastFaceTime)/1000).toFixed(0);
  const prompt = buildContextPrompt(trigger, secSinceFace);

  try {
    const res = await fetch(GROQ_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
      body: JSON.stringify({
        model: MODEL,
        messages:[
          { role:'system', content: buildSystem()
              .replace('{{FACE}}', faceDetected?'sim':'não')
              .replace('{{MOTION}}', motionLevel.toFixed(0))
              .replace('{{SOUND}}', soundLevel.toFixed(0))
              .replace('{{TIME}}', secSinceFace)
          },
          ...history.slice(-6),
          { role:'user', content: prompt }
        ],
        temperature: 0.95,
        max_tokens: 80
      })
    });
    const data = await res.json();
    if (!data.error) {
      let reply = data.choices[0].message.content;
      const mMatch = reply.match(/^\[(\w+)\]/);
      let mood = 'feliz';
      if (mMatch) { mood = MOOD_MAP[mMatch[1].toLowerCase()]||'feliz'; reply = reply.replace(/^\[\w+\]\s*/,''); }
      setEmotion(mood);
      showBubble(reply);
      history.push({ role:'assistant', content: data.choices[0].message.content });
      if (history.length > 20) history = history.slice(-20);
      localStorage.setItem('vex_hist', JSON.stringify(history));
    }
  } catch(e) {}

  busy = false;
  setTimeout(() => setStatus('OBSERVANDO'), 5000);
}

function buildContextPrompt(trigger, secIdle) {
  const map = {
    startup:        `VEX acabou de acordar e está vendo ${userName||'alguém'} pela primeira vez. Faça uma saudação curta e travessa.`,
    face_appear:    `${userName||'A pessoa'} apareceu na câmera! VEX viu e está animado. Reaja de forma brincalhona e carinhosa.`,
    bored:          `VEX está há ${secIdle}s sem ver ninguém e está entediado. Reclame de forma engraçada.`,
    big_motion:     `VEX detectou um movimento brusco e se assustou. Reaja surpreso e meio irritado.`,
    loud_sound:     `VEX ouviu um som alto e se assustou. Reaja de forma exagerada e cômica.`,
    comment_face:   `VEX está olhando para ${userName||'a pessoa'} e quer fazer um comentário espontâneo divertido.`,
    playful:        `VEX está com vontade de provocar ${userName||'a pessoa'} de forma carinhosa. Diga algo travesso.`,
    curious_comment:`VEX está curioso sobre o que ${userName||'a pessoa'} está fazendo. Pergunte de forma curiosa e animada.`,
  };
  return map[trigger] || 'VEX quer interagir espontaneamente.';
}

/* ═══════════════════════════════════════
   SPEECH RECOGNITION — continuous listen
═══════════════════════════════════════ */
function setupSpeechRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.lang = 'pt-BR';
  recognition.continuous = true;
  recognition.interimResults = false;

  recognition.onresult = async e => {
    const txt = e.results[e.results.length-1][0].transcript.trim();
    if (!txt || busy) return;
    setStatus('TE OUVI! 🎙️');
    setEmotion('curioso');
    await respondToSpeech(txt);
  };

  recognition.onerror = e => { if(e.error!=='no-speech') setTimeout(startListening, 1000); };
  recognition.onend   = () => { if(!busy) setTimeout(startListening, 500); };
  startListening();
}

function startListening() {
  try { recognition.start(); isListening=true; } catch(e){}
}

async function respondToSpeech(userTxt) {
  if (busy) return;
  busy = true;
  showBubble('...');
  setEmotion('pensando');

  history.push({ role:'user', content: userTxt });

  try {
    const res = await fetch(GROQ_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json','Authorization':`Bearer ${apiKey}` },
      body: JSON.stringify({
        model: MODEL,
        messages:[
          { role:'system', content: buildSystem()
              .replace('{{FACE}}', faceDetected?'sim':'não')
              .replace('{{MOTION}}', motionLevel.toFixed(0))
              .replace('{{SOUND}}', soundLevel.toFixed(0))
              .replace('{{TIME}}', '0')
          },
          ...history.slice(-10)
        ],
        temperature: 0.92,
        max_tokens: 100
      })
    });
    const data = await res.json();
    if (!data.error) {
      let reply = data.choices[0].message.content;
      const m = reply.match(/^\[(\w+)\]/);
      let mood='feliz';
      if (m) { mood=MOOD_MAP[m[1].toLowerCase()]||'feliz'; reply=reply.replace(/^\[\w+\]\s*/,''); }
      setEmotion(mood);
      showBubble(reply);
      history.push({ role:'assistant', content: data.choices[0].message.content });
      if (history.length>20) history=history.slice(-20);
      localStorage.setItem('vex_hist', JSON.stringify(history));
    }
  } catch(e) { showBubble('⚠️ Sem conexão!'); }

  busy = false;
  setStatus('OBSERVANDO');
}

/* ═══════════════════════════════════════
   BUBBLE
═══════════════════════════════════════ */
function showBubble(txt) {
  clearTimeout(bubbleTimer);
  const bub = document.getElementById('bubble');
  const el  = document.getElementById('bubble-txt');
  el.textContent = '';
  bub.classList.add('show');
  let i=0;
  const iv = setInterval(()=>{
    if (i < txt.length) { el.textContent += txt[i]; i++; }
    else { clearInterval(iv); }
  }, 18);
  bubbleTimer = setTimeout(() => bub.classList.remove('show'), 8000);
}

function setStatus(t) { document.getElementById('st-txt').textContent = t; }

  ];
  showBubble(msgs[Math.floor(Math.random()*msgs.length)].replace(/^\[\w+\]\s*/,''));
  const mood = msgs[Math.floor(Math.random()*msgs.length)].match(/^\[(\w+)\]/);
  if (mood) setEmotion(MOOD_MAP[mood[1]]||'animado');
});

function resetVex() {
  if (!confirm('Resetar VEX completamente?')) return;
  ['vex_key','vex_name','vex_face','vex_hist'].forEach(k=>localStorage.removeItem(k));
  location.reload();
}

window.addEventListener('resize', () => {
  ['l','r'].forEach(side => {
    const canvas = document.getElementById(`canvas-${side}`);
    const eye    = document.getElementById(`eye-${side}`);
    if (canvas && eye) { canvas.width=eye.offsetWidth; canvas.height=eye.offsetHeight; }
  });
});
</script>
