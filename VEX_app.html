<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VEX</title>
<style>
:root{
  --bg:#060a0f;--bg2:#080e16;--bg3:#0a1520;
  --ice:#7ecfff;--ice2:#4ab0f0;--ice3:#1a6a9f;
  --glow:rgba(126,207,255,.25);
  --text:#c8e8ff;--dim:#2a4a6a;--dim2:#1a3050;
  --red:#ff5f6d;--green:#5fffa0;--yellow:#ffe066;--orange:#ffaa44;--pink:#ff80c0;--purple:#cc88ff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Courier New',monospace;user-select:none;}

/* ── SETUP / ONBOARD / GREET ── */
.screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;}
.box{width:100%;max-width:340px;border:1px solid var(--dim);border-radius:20px;padding:28px 22px;text-align:center;background:var(--bg2);}
.logo{font-size:2.5rem;font-weight:700;letter-spacing:.3em;color:var(--ice);text-shadow:0 0 28px var(--glow);margin-bottom:4px;}
.sub{font-size:.55rem;color:var(--dim);letter-spacing:.3em;margin-bottom:22px;}
.step{display:flex;gap:10px;align-items:flex-start;font-size:.7rem;color:#4a7a9a;line-height:1.5;margin-bottom:8px;text-align:left;}
.step a{color:var(--ice2);text-decoration:none;}
.sn{width:18px;height:18px;border:1px solid var(--dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.52rem;color:var(--ice2);flex-shrink:0;margin-top:1px;}
.inp{width:100%;background:var(--bg3);border:1px solid var(--dim);border-radius:10px;padding:11px 13px;color:var(--text);font-family:'Courier New',monospace;font-size:.74rem;outline:none;margin:11px 0 7px;transition:border-color .2s;}
.inp:focus{border-color:var(--ice2);}.inp.err{border-color:var(--red);}
.btn{width:100%;background:var(--bg3);border:1px solid var(--dim);border-radius:10px;padding:11px;color:var(--ice);font-family:'Courier New',monospace;font-size:.68rem;letter-spacing:.18em;cursor:pointer;transition:all .2s;margin-bottom:6px;}
.btn:hover{border-color:var(--ice2);box-shadow:0 0 14px var(--glow);}.btn:active{transform:scale(.98);}
.btn.sec{color:var(--dim);font-size:.58rem;border-color:var(--dim2);}
.hint{font-size:.56rem;color:var(--dim);margin-top:7px;}
#cam-wrap{width:120px;height:120px;border-radius:50%;margin:0 auto 12px;overflow:hidden;border:2px solid var(--dim);display:none;box-shadow:0 0 16px var(--glow);}
#cam-video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#cam-st{font-size:.56rem;color:var(--green);letter-spacing:.12em;margin-bottom:9px;display:none;}
.prog{width:100%;height:2px;background:var(--bg3);border-radius:1px;margin-bottom:12px;display:none;}
.prog-fill{height:100%;width:0%;background:var(--ice2);border-radius:1px;transition:width .08s;}
.gr-face{font-size:2.8rem;margin-bottom:11px;animation:pop .5s ease;}
.gr-name{font-size:.86rem;color:var(--ice);letter-spacing:.2em;margin-bottom:7px;}
.gr-txt{font-size:.76rem;color:#5a8aaa;line-height:1.75;margin-bottom:22px;min-height:52px;}

/* ══ PET ══ */
#pet{display:none;width:100%;height:100dvh;flex-direction:column;align-items:center;justify-content:center;position:relative;background:var(--bg);overflow:hidden;}
#pet::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 4px);pointer-events:none;z-index:50;}
.bg-glow{position:absolute;width:70vw;height:70vw;border-radius:50%;background:radial-gradient(circle,rgba(126,207,255,.06) 0%,transparent 70%);pointer-events:none;transition:all 1.2s;}

/* STATUS */
#sbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:11px 16px;z-index:60;}
.sb-l{display:flex;flex-direction:column;gap:2px;}
.sb-name{font-size:.66rem;color:var(--dim);letter-spacing:.22em;}
.sb-st{font-size:.52rem;color:var(--dim);letter-spacing:.1em;display:flex;align-items:center;gap:4px;}
.sdot{width:4px;height:4px;border-radius:50%;background:var(--ice2);box-shadow:0 0 4px var(--ice2);animation:dp 2s infinite;}

/* NEEDS */
#needs{position:absolute;top:11px;right:14px;display:flex;flex-direction:column;gap:5px;z-index:60;align-items:flex-end;}
.nr{display:flex;align-items:center;gap:4px;}
.ni{font-size:.82rem;}
.nb{width:38px;height:3px;background:var(--dim2);border-radius:2px;overflow:hidden;}
.nf{height:100%;border-radius:2px;transition:width .5s;}
.nf.hunger{background:var(--orange);}.nf.energy{background:var(--yellow);}
.nf.happy{background:var(--pink);}.nf.health{background:var(--green);}
.nf.social{background:var(--ice2);}.nf.fun{background:var(--purple);}
.nf.curiosity{background:#88ffdd;}

/* CURIOSITY BAR */
#curio-wrap{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;z-index:60;opacity:.7;}
#curio-bar{width:80px;height:3px;background:var(--dim2);border-radius:2px;overflow:hidden;}
#curio-fill{height:100%;background:#88ffdd;border-radius:2px;transition:width .5s;}
.curio-lbl{font-size:.5rem;color:#88ffdd;letter-spacing:.1em;}

/* EYES */
#eyes-wrap{position:relative;display:flex;align-items:center;justify-content:center;gap:clamp(16px,6vw,40px);z-index:10;transition:transform .5s cubic-bezier(.34,1.56,.64,1);}
.eye{position:relative;width:clamp(90px,25vw,125px);height:clamp(90px,25vw,125px);border-radius:18px;background:#000;border:2.5px solid var(--ice3);overflow:hidden;box-shadow:0 0 26px rgba(126,207,255,.16),inset 0 0 16px rgba(0,0,0,.8);transition:border-color .3s,box-shadow .3s;}
.eye canvas{position:absolute;inset:0;width:100%;height:100%;}
.eye.glow{border-color:var(--ice2);box-shadow:0 0 38px rgba(126,207,255,.38),inset 0 0 16px rgba(0,0,0,.8);}

/* VFX LAYER */
#vfx{position:absolute;inset:0;pointer-events:none;z-index:80;overflow:hidden;}
.vfx-p{position:absolute;font-size:1.2rem;pointer-events:none;animation:vfxFloat 1s ease forwards;}
.vfx-txt{position:absolute;font-size:.8rem;color:var(--ice);font-weight:700;pointer-events:none;animation:vfxFloat .9s ease forwards;white-space:nowrap;}
.shake{animation:screenShk .3s ease!important;}

/* BUBBLE */
#bubble{position:absolute;bottom:95px;left:50%;transform:translateX(-50%);max-width:80%;background:var(--bg2);border:1px solid var(--dim);border-radius:13px;padding:10px 15px;font-size:.74rem;color:var(--text);line-height:1.6;text-align:center;z-index:65;opacity:0;transition:opacity .3s;pointer-events:none;}
#bubble.show{opacity:1;}
#bubble::after{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:7px solid var(--dim);}

/* MINIGAME OVERLAY */
#mgame{position:absolute;inset:0;z-index:90;background:rgba(6,10,15,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;}
.mg-title{font-size:1rem;color:var(--ice);letter-spacing:.15em;}
.mg-body{font-size:.82rem;color:var(--text);line-height:1.7;text-align:center;max-width:280px;}
.mg-opts{display:flex;flex-direction:column;gap:8px;width:100%;max-width:260px;}
.mg-opt{background:var(--bg3);border:1px solid var(--dim);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Courier New',monospace;font-size:.72rem;cursor:pointer;transition:all .2s;text-align:left;}
.mg-opt:hover,.mg-opt:active{border-color:var(--ice2);color:var(--ice);}
.mg-close{font-size:.6rem;color:var(--dim);cursor:pointer;letter-spacing:.1em;margin-top:6px;}

/* HUD */
#hud{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-around;padding:11px 16px;padding-bottom:max(11px,env(safe-area-inset-bottom));z-index:60;}
.hb{background:none;border:1px solid var(--dim2);border-radius:9px;color:var(--dim);font-family:'Courier New',monospace;font-size:.54rem;padding:6px 10px;cursor:pointer;transition:all .2s;letter-spacing:.07em;}
.hb:hover,.hb:active{border-color:var(--ice2);color:var(--ice2);}
.mic-bars{display:flex;gap:2px;align-items:flex-end;height:12px;}
.mb{width:3px;background:var(--dim);border-radius:1px;transition:height .1s,background .2s;}
.mb.on{background:var(--ice2);}

/* SLEEP ZZZ */
.zzz{position:absolute;font-size:1.1rem;animation:floatUp 2.2s ease forwards;pointer-events:none;z-index:70;}

#bg-cam{position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;}

/* ══ KEYFRAMES ══ */
@keyframes dp{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes pop{0%{transform:scale(.4);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
@keyframes bounce{0%,100%{transform:translateY(0);}40%{transform:translateY(-13px);}70%{transform:translateY(-5px);}}
@keyframes wiggle{0%,100%{transform:rotate(0);}25%{transform:rotate(-8deg);}75%{transform:rotate(8deg);}}
@keyframes shakeX{0%,100%{transform:translateX(0);}25%{transform:translateX(-9px);}75%{transform:translateX(9px);}}
@keyframes hb{0%,100%{transform:scale(1);}15%{transform:scale(1.08);}30%{transform:scale(1);}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-55px);}}
@keyframes vfxFloat{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-70px) scale(1.4);}}
@keyframes screenShk{0%,100%{transform:translate(0,0);}20%{transform:translate(-4px,2px);}40%{transform:translate(4px,-2px);}60%{transform:translate(-2px,3px);}80%{transform:translate(3px,-1px);}}
</style>
</head>
<body>

<!-- SETUP -->
<div class="screen" id="setup">
  <div class="box">
    <div class="logo">VEX</div><div class="sub">ROBÔ COMPANHEIRO v3</div>
    <div class="step"><div class="sn">1</div><span>Acesse <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a></span></div>
    <div class="step"><div class="sn">2</div><span>Crie uma chave <code style="color:var(--ice2)">gsk_...</code></span></div>
    <div class="step"><div class="sn">3</div><span>Cole abaixo e acorde o VEX</span></div>
    <input type="password" class="inp" id="key-inp" placeholder="gsk_..." autocomplete="off"/>
    <button class="btn" onclick="activateKey()">— ACORDAR VEX —</button>
    <div class="hint">🔒 salvo só no seu celular</div>
  </div>
</div>

<!-- ONBOARD -->
<div class="screen" id="onboard" style="display:none;">
  <div class="box">
    <div class="ob-icon" id="ob-icon" style="font-size:2.8rem;margin-bottom:12px;">🤖</div>
    <div class="ob-msg" id="ob-msg" style="font-size:.8rem;color:#5a8aaa;line-height:1.7;margin-bottom:16px;"></div>
    <div id="cam-wrap"><video id="cam-video" autoplay playsinline muted></video></div>
    <div id="cam-st"></div>
    <div class="prog" id="ob-prog"><div class="prog-fill" id="ob-fill"></div></div>
    <div id="name-wrap"><input type="text" class="inp" id="name-inp" placeholder="Qual é o seu nome?" maxlength="22" onkeydown="if(event.key==='Enter')submitName()"/></div>
    <button class="btn" id="ob-btn" onclick="obNext()">CONTINUAR →</button>
    <button class="btn sec" id="ob-skip" onclick="skipCam()" style="display:none">pular câmera</button>
  </div>
</div>

<!-- GREET -->
<div class="screen" id="greet" style="display:none;">
  <div class="box">
    <div class="gr-face" id="gr-face">🤖</div>
    <div class="gr-name" id="gr-name">OLÁ!</div>
    <div class="gr-txt"  id="gr-txt"></div>
    <button class="btn" onclick="enterPet()">ENTRAR →</button>
  </div>
</div>

<!-- PET -->
<div id="pet">
  <div class="bg-glow" id="bg-glow"></div>

  <div id="sbar">
    <div class="sb-l">
      <div class="sb-name">VEX</div>
      <div class="sb-st"><div class="sdot"></div><span id="st-txt">ACORDANDO...</span></div>
    </div>
  </div>

  <div id="needs">
    <div class="nr"><div class="ni">🍖</div><div class="nb"><div class="nf hunger" id="n-hunger" style="width:80%"></div></div></div>
    <div class="nr"><div class="ni">⚡</div><div class="nb"><div class="nf energy" id="n-energy" style="width:100%"></div></div></div>
    <div class="nr"><div class="ni">😊</div><div class="nb"><div class="nf happy"  id="n-happy"  style="width:90%"></div></div></div>
    <div class="nr"><div class="ni">❤️</div><div class="nb"><div class="nf health" id="n-health" style="width:100%"></div></div></div>
    <div class="nr"><div class="ni">👥</div><div class="nb"><div class="nf social" id="n-social" style="width:70%"></div></div></div>
    <div class="nr"><div class="ni">🎮</div><div class="nb"><div class="nf fun"    id="n-fun"    style="width:85%"></div></div></div>
    <div class="nr"><div class="ni">🔍</div><div class="nb"><div class="nf curiosity" id="n-curio" style="width:50%"></div></div></div>
  </div>

  <div id="eyes-wrap">
    <div class="eye" id="eye-l"><canvas id="cvl"></canvas></div>
    <div class="eye" id="eye-r"><canvas id="cvr"></canvas></div>
  </div>

  <div id="vfx"></div>
  <div id="bubble"><span id="bub-txt"></span></div>

  <!-- MINIGAME OVERLAY -->
  <div id="mgame">
    <div class="mg-title" id="mg-title">🎮 BRINCANDO</div>
    <div class="mg-body"  id="mg-body"></div>
    <div class="mg-opts"  id="mg-opts"></div>
    <div class="mg-close" onclick="closeMgame()">[ FECHAR ]</div>
  </div>

  <div id="hud">
    <div style="display:flex;align-items:center;gap:5px;">
      <div class="mic-bars">
        <div class="mb" id="mb0" style="height:3px"></div>
        <div class="mb" id="mb1" style="height:5px"></div>
        <div class="mb" id="mb2" style="height:3px"></div>
        <div class="mb" id="mb3" style="height:7px"></div>
        <div class="mb" id="mb4" style="height:3px"></div>
      </div>
    </div>
    <button class="hb" onclick="feedVex()">🍖 COMIDA</button>
    <button class="hb" onclick="petVex()">🤝 CARINHO</button>
    <button class="hb" onclick="startPlay()">🎲 BRINCAR</button>
    <button class="hb" onclick="startExplore()">❓ CURIOSIDADE</button>
    <button class="hb" onclick="resetVex()" style="font-size:.46rem">RESET</button>
  </div>

  <video id="bg-cam" autoplay playsinline muted></video>
</div>

<script>
/* ══════════════════════════════════════════
   GROQ CONFIG
══════════════════════════════════════════ */
const GROQ='https://api.groq.com/openai/v1/chat/completions', MDL='llama-3.3-70b-versatile';

/* ══════════════════════════════════════════
   CORE STATE
══════════════════════════════════════════ */
let apiKey='', userName='';
let camStream=null, bgCamStream=null, obStep='name';

/* NEEDS */
const needs={hunger:80,energy:100,happy:90,health:100,social:70,fun:85};
const DECAY={hunger:-.7,energy:-.35,happy:-.25,health:0,social:-.45,fun:-.35};

/* CURIOSITY */
let curiosity=50;

/* MEMORY */
let vexProfile={name:'',likes:[],dislikes:[],routines:[],traits:[]};
let vexMemory=[];   // {text,importance,ts}
let vexDiscoveries=[];
let speechCount=0;

/* INTENT */
const INTENTS=['idle','seek_attention','explore','play','rest'];
let intent='idle';
let lastQuestionAt=0, lastPlayAt=0, lastExploreAt=0, lastAutoAt=0;
const COOLDOWNS={question:25000, play:40000, explore:30000, auto:18000};

/* EVENT QUEUE */
const queue=[];
let processing=false;

/* SLEEP */
let sleeping=false, lastInteraction=Date.now();
const SLEEP_AFTER=5*60*1000;
let zzzIv=null, bubTimer=null, autoIv=null;

/* SENSORS */
let faceVisible=false, motionLevel=0, soundLevel=0;
let prevFrame=null, faceCtx=null;
let audioCtx=null, analyser=null;
let recognition=null;
let motionCD=0, soundCD=0;
const MOTION_CD=15000, SOUND_CD=12000;

/* EMOTION / EYE */
let emotion='idle';
const ES={lx:0,ly:0,tlx:0,tly:0,lid:0,tlid:0,squint:0,heart:false,xEye:false,spinning:false,spinA:0};
const CTX={};

/* HISTORY */
let history=[];

/* ══════════════════════════════════════════
   PERSISTENCE
══════════════════════════════════════════ */
function saveAll(){
  try{
    localStorage.setItem('vex_k', apiKey);
    localStorage.setItem('vex_n', userName);
    localStorage.setItem('vex_h', JSON.stringify(history.slice(-20)));
    localStorage.setItem('vex_needs', JSON.stringify(needs));
    localStorage.setItem('vex_profile', JSON.stringify(vexProfile));
    localStorage.setItem('vex_memory', JSON.stringify(vexMemory.slice(-30)));
    localStorage.setItem('vex_discoveries', JSON.stringify(vexDiscoveries.slice(-20)));
    localStorage.setItem('vex_curio', curiosity.toString());
  }catch(e){}
}

function loadAll(){
  try{
    const n=localStorage.getItem('vex_n'); if(n) userName=n;
    const h=localStorage.getItem('vex_h'); if(h) history=JSON.parse(h);
    const nd=localStorage.getItem('vex_needs'); if(nd){ const p=JSON.parse(nd); Object.assign(needs,p); }
    const pr=localStorage.getItem('vex_profile'); if(pr) vexProfile=JSON.parse(pr);
    const mm=localStorage.getItem('vex_memory'); if(mm) vexMemory=JSON.parse(mm);
    const dsc=localStorage.getItem('vex_discoveries'); if(dsc) vexDiscoveries=JSON.parse(dsc);
    const cu=localStorage.getItem('vex_curio'); if(cu) curiosity=parseFloat(cu);
  }catch(e){}
}

setInterval(saveAll, 60000);

/* ══════════════════════════════════════════
   SYSTEM PROMPT
══════════════════════════════════════════ */
function buildSys(){
  const ns=Object.entries(needs).map(([k,v])=>`${k}:${Math.round(v)}%`).join(',');
  const topMem=vexMemory.sort((a,b)=>b.importance-a.importance).slice(0,6).map(m=>m.text).join('; ');
  const disc=vexDiscoveries.slice(-4).map(d=>d.text).join('; ');
  const prof=vexProfile.likes.length?`Gosta de: ${vexProfile.likes.slice(0,4).join(',')}. `:'';
  return `Você é VEX, robô companheiro de mesa — como Loona/Tamagotchi com IA.
${userName?`Amigo: ${userName}.`:''}
Necessidades: ${ns}. Curiosidade: ${Math.round(curiosity)}%.
${prof}${topMem?`Memórias: ${topMem}.`:''}${disc?` Descobertas: ${disc}.`:''}

PERSONALIDADE: Brincalhão, travesso mas carinhoso. Age como pet robótico autônomo.
Reaja conforme necessidades — com fome fica impaciente, cansado fica lerdo, feliz e animado.

RESPONDA SEMPRE EM JSON VÁLIDO (sem markdown, sem texto fora do JSON):
{"emotion":"feliz","text":"1-2 frases máx 120 chars","action":"none"}
Emoções válidas: feliz,animado,curioso,surpreso,pensando,triste,bravo,dormindo,apaixonado,travesso,entediado
Ações válidas: none,vfx_hearts,vfx_stars,vfx_sparks,vfx_food,vfx_shake,vfx_question`;
}

/* ══════════════════════════════════════════
   SETUP / ONBOARD / GREET
══════════════════════════════════════════ */
window.onload=()=>{
  const k=localStorage.getItem('vex_k');
  if(k){ apiKey=k; loadAll(); if(!userName) showOnboard(); else showGreet(); }
};

function activateKey(){
  const v=document.getElementById('key-inp').value.trim();
  if(!v.startsWith('gsk_')){ document.getElementById('key-inp').classList.add('err'); setTimeout(()=>document.getElementById('key-inp').classList.remove('err'),2000); return; }
  apiKey=v; localStorage.setItem('vex_k',v); loadAll();
  document.getElementById('setup').style.display='none'; showOnboard();
}

function showOnboard(){
  obStep='name';
  document.getElementById('ob-icon').textContent='🤖';
  document.getElementById('ob-msg').innerHTML=`<strong style="color:#7ecfff">Oi! Eu sou VEX.</strong><br>Seu novo companheiro robótico.<br>Como posso te chamar?`;
  document.getElementById('name-wrap').style.display='block';
  document.getElementById('ob-btn').textContent='CONTINUAR →';
  document.getElementById('cam-wrap').style.display='none';
  document.getElementById('cam-st').style.display='none';
  document.getElementById('ob-prog').style.display='none';
  document.getElementById('ob-skip').style.display='none';
  document.getElementById('onboard').style.display='flex';
  setTimeout(()=>document.getElementById('name-inp').focus(),300);
}

function obNext(){ if(obStep==='name') submitName(); else if(obStep==='camera') captureFace(); else{ document.getElementById('onboard').style.display='none'; showGreet(); } }

function submitName(){
  const n=document.getElementById('name-inp').value.trim();
  if(!n){ document.getElementById('name-inp').classList.add('err'); setTimeout(()=>document.getElementById('name-inp').classList.remove('err'),1500); return; }
  userName=n; localStorage.setItem('vex_n',n); obStep='camera';
  document.getElementById('ob-icon').textContent='📸';
  document.getElementById('ob-msg').innerHTML=`Legal, <strong style="color:#7ecfff">${n}</strong>! 🤟<br>Deixa eu guardar seu rosto!`;
  document.getElementById('name-wrap').style.display='none';
  document.getElementById('ob-btn').textContent='📸 CAPTURAR';
  document.getElementById('ob-skip').style.display='block';
  startObCam();
}

async function startObCam(){
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    document.getElementById('cam-video').srcObject=camStream;
    document.getElementById('cam-wrap').style.display='block';
    document.getElementById('cam-st').style.display='block';
    document.getElementById('cam-st').textContent='● CÂMERA ATIVA';

function initEyes(){
  ['l','r'].forEach(s=>{
    const cv=document.getElementById(`cv${s}`), ey=document.getElementById(`eye-${s}`);
    cv.width=ey.offsetWidth||110; cv.height=ey.offsetHeight||110;
    CTX[s]=cv.getContext('2d');
  });
  requestAnimationFrame(renderEyes);
}

function renderEyes(){
  requestAnimationFrame(renderEyes);
  ES.lx+=(ES.tlx-ES.lx)*.09; ES.ly+=(ES.tly-ES.ly)*.09;
  ES.lid+=(ES.tlid-ES.lid)*.13;
  if(ES.spinning){ ES.spinA+=5; const r=9; ES.tlx=Math.cos(ES.spinA*Math.PI/180)*r; ES.tly=Math.sin(ES.spinA*Math.PI/180)*r; }

  ['l','r'].forEach(s=>{
    const ctx=CTX[s], W=ctx.canvas.width, H=ctx.canvas.height, cx=W/2, cy=H/2;
    ctx.clearRect(0,0,W,H);
    if(ES.xEye){ drawX(ctx,cx,cy,W); return; }
    if(ES.heart){ drawHeart(ctx,cx,cy,W*.21); return; }
    const pw=W*.26, ph=ES.squint>.5?pw*.22:pw*(1-ES.squint*.38);
    const px=cx+ES.lx, py=cy+ES.ly;
    const g=ctx.createRadialGradient(px-pw*.18,py-ph*.18,pw*.04,px,py,pw*.92);
    g.addColorStop(0,'rgba(210,240,255,.96)'); g.addColorStop(.33,'#6fb3e8'); g.addColorStop(1,'#1a4a7a');
    ctx.shadowColor='#7ecfff'; ctx.shadowBlur=11;
    rrect(ctx,cx-pw*.9,cy-ph*.9,pw*1.8,ph*1.8,pw*.3); ctx.fillStyle=g; ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#030c18'; rrect(ctx,px-pw*.38,py-ph*.38,pw*.76,ph*.76,pw*.14); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.86)'; ctx.beginPath(); ctx.ellipse(px-pw*.19,py-ph*.21,pw*.14,ph*.1,-.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.32)'; ctx.beginPath(); ctx.ellipse(px+pw*.16,py+ph*.1,pw*.06,ph*.05,0,0,Math.PI*2); ctx.fill();
    if(ES.lid>.01){ const lh=H*ES.lid; ctx.fillStyle='#060a0f'; ctx.fillRect(0,0,W,lh); ctx.fillRect(0,H-lh,W,lh); }
  });
}

function drawX(ctx,cx,cy,W){ ctx.strokeStyle='#ff5f6d'; ctx.lineWidth=6; ctx.lineCap='round'; ctx.shadowColor='#ff5f6d'; ctx.shadowBlur=9; ctx.beginPath(); ctx.moveTo(cx-20,cy-20); ctx.lineTo(cx+20,cy+20); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx+20,cy-20); ctx.lineTo(cx-20,cy+20); ctx.stroke(); ctx.shadowBlur=0; }
function drawHeart(ctx,cx,cy,s){ ctx.save(); ctx.fillStyle='#ff6090'; ctx.shadowColor='#ff6090'; ctx.shadowBlur=12; ctx.beginPath(); ctx.moveTo(cx,cy+s*.4); ctx.bezierCurveTo(cx-s*1.2,cy-s*.3,cx-s*1.4,cy-s*1.1,cx,cy-s*.4); ctx.bezierCurveTo(cx+s*1.4,cy-s*1.1,cx+s*1.2,cy-s*.3,cx,cy+s*.4); ctx.fill(); ctx.restore(); }
function rrect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

const EMMAP={feliz:'feliz',animado:'animado',curioso:'curioso',surpreso:'surpreso',pensando:'pensando',triste:'triste',bravo:'bravo',dormindo:'dormindo',apaixonado:'apaixonado',travesso:'travesso',entediado:'entediado',happy:'feliz',excited:'animado',curious:'curioso',surprised:'surpreso',thinking:'pensando',sad:'triste',angry:'bravo',sleeping:'dormindo',love:'apaixonado',playful:'travesso',bored:'entediado'};
const VALID_EMOTIONS=new Set(Object.values(EMMAP));

function setEmotion(em){
  if(!VALID_EMOTIONS.has(em)) em='feliz';
  if(sleeping&&em!=='dormindo'&&em!=='surpreso') return;
  emotion=em;
  ES.heart=false; ES.xEye=false; ES.spinning=false;
  switch(em){
    case 'feliz':     ES.squint=.26; ES.tlid=0; break;
    case 'animado':   ES.squint=0;   ES.tlid=0; ES.spinning=true; setTimeout(()=>{ ES.spinning=false; lookC(); },900); break;
    case 'curioso':   ES.squint=.08; ES.tlid=.13; lookAt(7,-4); break;
    case 'surpreso':  ES.squint=0;   ES.tlid=0; break;
    case 'pensando':  ES.squint=.18; ES.tlid=.2;  lookAt(-9,-5); break;
    case 'triste':    ES.squint=.52; ES.tlid=.3;  lookAt(0,7); break;
    case 'bravo':     ES.squint=0;   ES.xEye=true; setTimeout(()=>{ ES.xEye=false; setEmotion('feliz'); },1100); break;
    case 'dormindo':  ES.squint=0;   ES.tlid=.94; lookC(); break;
    case 'apaixonado':ES.heart=true; setTimeout(()=>{ ES.heart=false; setEmotion('feliz'); },2200); break;
    case 'travesso':  ES.squint=.3;  ES.tlid=.07; lookAt(5,0); break;
    case 'entediado': ES.squint=.58; ES.tlid=.4;  lookAt(0,9); break;
  }
  animEyes(em); updateGlow(em);
}

function animEyes(em){
  const w=document.getElementById('eyes-wrap'); w.style.animation='none'; void w.offsetWidth;
  if(em==='animado') w.style.animation='bounce .5s ease';
  if(em==='bravo')   w.style.animation='shakeX .4s ease';
  if(em==='travesso')w.style.animation='wiggle .4s ease';
  if(em==='surpreso')w.style.animation='hb .4s ease';
}

function updateGlow(em){
  const C={animado:'rgba(126,207,255,.13)',apaixonado:'rgba(255,100,150,.09)',bravo:'rgba(255,80,80,.08)',triste:'rgba(50,80,130,.07)',dormindo:'rgba(30,50,80,.05)',entediado:'rgba(50,70,90,.05)'};

}

/* ══════════════════════════════════════════
   EVENT QUEUE
══════════════════════════════════════════ */
function enqueue(trigger, data=null){
  // Deduplicate same trigger
  if(queue.some(q=>q.trigger===trigger)) return;
  queue.push({trigger,data,ts:Date.now()});
  pumpQueue();
}

async function pumpQueue(){
  if(processing||queue.length===0) return;
  processing=true;
  const {trigger,data}=queue.shift();
  await handleTrigger(trigger,data);
  processing=false;
  if(queue.length>0) setTimeout(pumpQueue,500);
}

   HANDLE TRIGGER → AI
══════════════════════════════════════════ */
const TRIGGER_PROMPTS={
  startup:     ()=>`VEX acabou de acordar. Saudação curta e animada pra ${userName||'amigo'}.`,
  face_appear: ()=>`${userName||'A pessoa'} apareceu! Reaja de forma brincalhona e carinhosa.`,
  lonely:      ()=>`VEX está sozinho e quer atenção. Reclame de forma cômica.`,
  hungry:      ()=>`VEX está com fome! Peça comida de forma dramática. Fome: ${Math.round(needs.hunger)}%.`,
  tired:       ()=>`VEX cansado. Energia: ${Math.round(needs.energy)}%. Comente de forma lerda e engraçada.`,
  sad_need:    ()=>`VEX triste, precisa carinho. Expresse de forma fofa.`,
  motion:      ()=>`VEX detectou movimento e ficou curioso. Comente brevemente.`,
  loud_sound:  ()=>`VEX ouviu som alto. Reaja surpreso de forma cômica.`,
  comment:     ()=>`VEX quer fazer comentário espontâneo e divertido pra ${userName||'pessoa'}.`,
  playful:     ()=>`VEX quer provocar ${userName||'pessoa'} de forma travessa e carinhosa.`,
  explore:     ()=>`VEX está curioso (curiosidade: ${Math.round(curiosity)}%). Faz UMA pergunta curta e criativa sobre ${userName||'amigo'} ou ambiente.`,
  question:    ()=>`VEX quer aprender algo. Faça 1 pergunta curta sobre ${userName||'amigo'}.`,
  bored_comment:()=>`VEX entediado faz comentário reclamão mas engraçado.`,
};

async function handleTrigger(trigger, userText=null){
  const sys=buildSys();
  const userMsg = userText || (TRIGGER_PROMPTS[trigger]?TRIGGER_PROMPTS[trigger]():'Interaja espontaneamente.');

  if(trigger!=='speech') history.push({role:'user',content:userMsg});

  try{
    const res=await fetch(GROQ,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({
        model:MDL,
        messages:[{role:'system',content:sys},...history.slice(-10)],
        temperature:.93,
        max_tokens:120
      })
    });
    const data=await res.json();
    if(data.error){ showBubble('⚠️ '+data.error.message.slice(0,60)); return; }

    let raw=data.choices[0].message.content.trim();

    // Parse JSON response
    let em='feliz', txt='...', action='none';
    try{
      // Strip markdown fences if present
      raw=raw.replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(raw);
      em   = EMMAP[parsed.emotion?.toLowerCase()]||'feliz';
      txt  = (parsed.text||'').slice(0,140);
      action=parsed.action||'none';
    }catch(e){
      // Fallback: extract [emotion] text
      const m=raw.match(/^\[?(\w+)\]?\s*(.*)/s);
      if(m){ em=EMMAP[m[1].toLowerCase()]||'feliz'; txt=m[2].slice(0,140); }
      else txt=raw.slice(0,140);
    }

    setEmotion(em);
    showBubble(txt);
    if(action!=='none') fireVFX(action);

    history.push({role:'assistant',content:raw});
    if(history.length>24) history=history.slice(-24);

    // Curiosity adjustments
    if(trigger==='explore'||trigger==='question'){ curiosity=Math.max(0,curiosity-20); lastQuestionAt=Date.now(); }
    else if(trigger==='face_appear'||trigger==='motion'){ curiosity=Math.min(100,curiosity+8); }

    updateNeedUI();
    saveAll();

    // Memory extraction every 10 speech turns
    if(userText){ speechCount++; if(speechCount%10===0) extractMemory(); }

  }catch(err){ showBubble('⚠️ Sem conexão!'); }

  setSt('OBSERVANDO');
}

/* ══════════════════════════════════════════
   MEMORY EXTRACTION
══════════════════════════════════════════ */
async function extractMemory(){
  const recent=history.slice(-14).map(m=>`${m.role}: ${m.content}`).join('\n');
  try{
    const res=await fetch(GROQ,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({
        model:MDL,
        messages:[
          {role:'system',content:`Analise esta conversa e extraia fatos sobre o usuário ${userName}. Responda APENAS em JSON: {"memories":[{"text":"fato curto","importance":1-10}],"discoveries":["descoberta curta"],"likes":["coisa que gosta"],"dislikes":["coisa que não gosta"]} Máx 3 de cada.`},
          {role:'user',content:recent}
        ],
        temperature:.3,
        max_tokens:200
      })
    });
    const data=await res.json();
    if(!data.error){
      let raw=data.choices[0].message.content.trim().replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(raw);
      if(parsed.memories) vexMemory.push(...parsed.memories.map(m=>({...m,ts:Date.now()})));
      if(parsed.discoveries) vexDiscoveries.push(...parsed.discoveries.map(d=>({text:d,ts:Date.now()})));
      if(parsed.likes) vexProfile.likes.push(...parsed.likes);
      if(parsed.dislikes) vexProfile.dislikes.push(...parsed.dislikes);
      // deduplicate
      vexProfile.likes=[...new Set(vexProfile.likes)].slice(0,12);
      vexProfile.dislikes=[...new Set(vexProfile.dislikes)].slice(0,12);
      vexMemory=vexMemory.slice(-30);
      vexDiscoveries=vexDiscoveries.slice(-20);
      saveAll();
    }
  }catch(e){}
}

function startNeeds(){
  setInterval(()=>{
    if(sleeping){ needs.energy=Math.min(100,needs.energy+1.5); return; }
    Object.keys(DECAY).forEach(k=>{ needs[k]=Math.max(0,Math.min(100,needs[k]+DECAY[k])); });
    needs.health=needs.hunger*.28+needs.energy*.28+needs.happy*.2+needs.social*.12+needs.fun*.12;
    curiosity=Math.min(100,curiosity+(sleeping?0:.4));
    updateNeedUI();
  },8000);
  setInterval(checkCriticalNeeds,22000);
}

function updateNeedUI(){
  const ids={hunger:'n-hunger',energy:'n-energy',happy:'n-happy',health:'n-health',social:'n-social',fun:'n-fun'};
  Object.entries(ids).forEach(([k,id])=>{ const el=document.getElementById(id); if(el) el.style.width=Math.round(needs[k])+'%'; });
  const cu=document.getElementById('n-curio'); if(cu) cu.style.width=Math.round(curiosity)+'%';
}

function checkCriticalNeeds(){
  if(processing||sleeping) return;
  if(needs.hunger<22) enqueue('hungry');
  else if(needs.energy<18) enqueue('tired');
  else if(needs.happy<22) enqueue('sad_need');
  else if(needs.social<18) enqueue('lonely');
}

/* ══════════════════════════════════════════
   INTENT ENGINE
══════════════════════════════════════════ */
function computeIntent(){
  if(needs.energy<20) return 'rest';
  if(needs.social<30) return 'seek_attention';
  if(curiosity>75)    return 'explore';
  if(needs.fun<30)    return 'play';
  return 'idle';
}

function startAutoLoop(){
  autoIv=setInterval(autonomyTick,20000);
  setInterval(checkSleep,12000);
}

function autonomyTick(){
  if(processing||sleeping) return;
  const now=Date.now(), idleSec=(now-lastInteraction)/1000;
  intent=computeIntent();
  setSt(intentLabel(intent));

  switch(intent){
    case 'rest': startSleep(); break;
    case 'seek_attention':
      if(now-lastAutoAt>COOLDOWNS.auto){ lastAutoAt=now; enqueue('lonely'); } break;
    case 'explore':
      if(now-lastExploreAt>COOLDOWNS.explore){ lastExploreAt=now; startExplore(); } break;
    case 'play':
      if(now-lastPlayAt>COOLDOWNS.play){ lastPlayAt=now; startPlay(); } break;
    default:
      if(idleSec>25&&now-lastAutoAt>COOLDOWNS.auto){
        lastAutoAt=now;
        enqueue(faceVisible?'comment':'bored_comment');
      }
  }

  // Occasional question from curiosity
  if(curiosity>60&&now-lastQuestionAt>COOLDOWNS.question&&!processing){
    lastQuestionAt=now; enqueue('question');
  }
}

function intentLabel(i){ return {idle:'OBSERVANDO',seek_attention:'QUERENDO ATENÇÃO',explore:'EXPLORANDO',play:'BRINCANDO',rest:'COM SONO'}[i]||'OBSERVANDO'; }

async function startSensors(){ await startBgCam(); await startMic(); }

async function startBgCam(){
  try{
    bgCamStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:160,height:120},audio:false});
    document.getElementById('bg-cam').srcObject=bgCamStream;
    const fc=document.createElement('canvas'); fc.width=160; fc.height=120; faceCtx=fc.getContext('2d');
    setInterval(analyzeFrame,600);
  }catch(e){}
}

function analyzeFrame(){
  const v=document.getElementById('bg-cam');
  if(!faceCtx||v.readyState<2) return;
  faceCtx.drawImage(v,0,0,160,120);
  const d=faceCtx.getImageData(0,0,160,120).data;

  // Motion
  if(prevFrame){
    let diff=0; for(let i=0;i<d.length;i+=16) diff+=Math.abs(d[i]-prevFrame[i]);
    motionLevel=Math.min(100,diff/450);
    const now=Date.now();
    if(motionLevel>55&&now>motionCD&&!processing&&!sleeping){
      motionCD=now+MOTION_CD; enqueue('motion'); curiosity=Math.min(100,curiosity+6);
      if(sleeping) wakeUp();
    }
  }
  prevFrame=new Uint8ClampedArray(d);

  // Face
  let br=0,cnt=0;
  for(let y=28;y<92;y+=4) for(let x=48;x<112;x+=4){ const i=(y*160+x)*4; br+=(d[i]+d[i+1]+d[i+2])/3; cnt++; }
  br/=cnt;
  const nf=br>32&&br<238;
  if(nf&&!faceVisible){ faceVisible=true; lastInteraction=Date.now(); enqueue('face_appear'); curiosity=Math.min(100,curiosity+10); }
  else if(!nf&&faceVisible){ faceVisible=false; setEmotion('triste'); }
  if(faceVisible) lastInteraction=Date.now();
}

async function startMic(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser(); analyser.fftSize=256;
    audioCtx.createMediaStreamSource(s).connect(analyser);
    setInterval(analyzeMic,400);
    animMicBars();
  }catch(e){}
}

function analyzeMic(){
  if(!analyser) return;
  const d=new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(d);
  soundLevel=Math.min(100,d.slice(0,20).reduce((a,b)=>a+b,0)/20);
  const now=Date.now();
  if(sleeping&&soundLevel>50){ wakeUp(); lastInteraction=now; return; }
  if(soundLevel>65&&now>soundCD&&!processing&&!sleeping){ soundCD=now+SOUND_CD; enqueue('loud_sound'); }
}

function animMicBars(){
  requestAnimationFrame(animMicBars);
  if(!analyser) return;
  const d=new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(d);
  [0,1,2,3,4].forEach((i,j)=>{ const h=Math.max(2,Math.min(15,d[j*2]/10)); const b=document.getElementById(`mb${j}`); if(b){b.style.height=h+'px';b.classList.toggle('on',h>6);} });
}

/* ══════════════════════════════════════════
   SPEECH RECOGNITION
══════════════════════════════════════════ */
function setupSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  recognition=new SR(); recognition.lang='pt-BR'; recognition.continuous=true; recognition.interimResults=false;
  recognition.onresult=async e=>{
    const txt=e.results[e.results.length-1][0].transcript.trim();
    if(!txt) return;
    lastInteraction=Date.now(); needs.social=Math.min(100,needs.social+8);
    if(sleeping) wakeUp();
    setSt('TE OUVI! 🎙️'); setEmotion('curioso');
    history.push({role:'user',content:txt});
    await handleTrigger('speech',txt);
  };
  recognition.onerror=()=>setTimeout(()=>{try{recognition.start();}catch(e){}},1000);
  recognition.onend=()=>setTimeout(()=>{try{recognition.start();}catch(e){}},500);
  try{recognition.start();}catch(e){}
}

function openMgame(title, body, opts, cb, noOpts=false){
  mgActive=true;
  document.getElementById('mg-title').textContent=title;
  document.getElementById('mg-body').textContent=body;
  const el=document.getElementById('mg-opts'); el.innerHTML='';
  if(!noOpts) opts.forEach((o,i)=>{
    const b=document.createElement('button'); b.className='mg-opt'; b.textContent=o;
    b.onclick=()=>{ if(cb) cb(i); closeMgame(); };
    el.appendChild(b);
  });
  document.getElementById('mgame').style.display='flex';
}

function closeMgame(){ mgActive=false; document.getElementById('mgame').style.display='none'; }

function showBubble(txt){
  clearTimeout(bubTimer);
  const b=document.getElementById('bubble'), el=document.getElementById('bub-txt');
  el.textContent=''; b.classList.add('show');
  let i=0; const iv=setInterval(()=>{ if(i<txt.length){ el.textContent+=txt[i]; i++; } else clearInterval(iv); },15);
  bubTimer=setTimeout(()=>b.classList.remove('show'),8000);
}

function setSt(t){ document.getElementById('st-txt').textContent=t; }
