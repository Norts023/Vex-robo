<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VEX</title>
<style>
:root{
  --bg:#060a0f; --bg2:#080e16; --bg3:#0a1520;
  --ice:#7ecfff; --ice2:#4ab0f0; --ice3:#1a6a9f;
  --glow:rgba(126,207,255,0.25);
  --text:#c8e8ff; --dim:#2a4a6a; --dim2:#1a3050;
  --red:#ff5f6d; --green:#5fffa0; --yellow:#ffe066; --orange:#ffaa44; --pink:#ff80c0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Courier New',monospace;user-select:none;}

/* ── SETUP ── */
#setup{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;}
.box{width:100%;max-width:340px;border:1px solid var(--dim);border-radius:20px;padding:28px 22px;text-align:center;background:var(--bg2);}
.logo{font-size:2.6rem;font-weight:700;letter-spacing:.3em;color:var(--ice);text-shadow:0 0 30px var(--glow);margin-bottom:4px;}
.sub{font-size:.56rem;color:var(--dim);letter-spacing:.3em;margin-bottom:24px;}
.step{display:flex;gap:10px;align-items:flex-start;font-size:.72rem;color:#4a7a9a;line-height:1.5;margin-bottom:9px;text-align:left;}
.step a{color:var(--ice2);text-decoration:none;}
.sn{width:18px;height:18px;border:1px solid var(--dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.54rem;color:var(--ice2);flex-shrink:0;margin-top:1px;}
.inp{width:100%;background:var(--bg3);border:1px solid var(--dim);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Courier New',monospace;font-size:.76rem;outline:none;margin:12px 0 8px;transition:border-color .2s;}
.inp:focus{border-color:var(--ice2);}
.inp.err{border-color:var(--red);}
.btn{width:100%;background:var(--bg3);border:1px solid var(--dim);border-radius:10px;padding:12px;color:var(--ice);font-family:'Courier New',monospace;font-size:.7rem;letter-spacing:.18em;cursor:pointer;transition:all .2s;margin-bottom:7px;}
.btn:hover{border-color:var(--ice2);box-shadow:0 0 14px var(--glow);}
.btn:active{transform:scale(.98);}
.btn.sec{color:var(--dim);font-size:.6rem;border-color:var(--dim2);}
.hint{font-size:.58rem;color:var(--dim);margin-top:8px;}

/* ── ONBOARD ── */
#onboard{position:fixed;inset:0;z-index:998;background:var(--bg);display:none;align-items:center;justify-content:center;padding:20px;}
.ob-icon{font-size:2.8rem;margin-bottom:12px;}
.ob-msg{font-size:.82rem;color:#5a8aaa;line-height:1.7;margin-bottom:18px;}
#cam-wrap{width:130px;height:130px;border-radius:50%;margin:0 auto 14px;overflow:hidden;border:2px solid var(--dim);display:none;box-shadow:0 0 18px var(--glow);}
#cam-video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#cam-st{font-size:.58rem;color:var(--green);letter-spacing:.12em;margin-bottom:10px;display:none;}
.prog{width:100%;height:2px;background:var(--bg3);border-radius:1px;margin-bottom:14px;display:none;}
.prog-fill{height:100%;width:0%;background:var(--ice2);border-radius:1px;transition:width .08s;}

/* ── GREET ── */
#greet{position:fixed;inset:0;z-index:997;background:var(--bg);display:none;align-items:center;justify-content:center;padding:20px;}
.gr-face{font-size:3rem;margin-bottom:12px;animation:pop .5s ease;}
.gr-name{font-size:.88rem;color:var(--ice);letter-spacing:.2em;margin-bottom:8px;}
.gr-txt{font-size:.78rem;color:#5a8aaa;line-height:1.75;margin-bottom:24px;min-height:56px;}

/* ══ PET SCREEN ══ */
#pet{display:none;width:100%;height:100dvh;flex-direction:column;align-items:center;justify-content:center;position:relative;background:var(--bg);overflow:hidden;}
#pet::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:50;}
.bg-glow{position:absolute;width:70vw;height:70vw;border-radius:50%;background:radial-gradient(circle,rgba(126,207,255,.06) 0%,transparent 70%);pointer-events:none;transition:all 1.2s ease;}

/* ── STATUS BAR ── */
#sbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;z-index:60;}
.sb-left{display:flex;flex-direction:column;gap:2px;}
.sb-name{font-size:.68rem;color:var(--dim);letter-spacing:.22em;}
.sb-st{font-size:.54rem;color:var(--dim);letter-spacing:.1em;display:flex;align-items:center;gap:4px;}
.sdot{width:4px;height:4px;border-radius:50%;background:var(--ice2);box-shadow:0 0 4px var(--ice2);animation:dp 2s infinite;}

/* ── NEEDS ICONS ── */
#needs{position:absolute;top:12px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:60;align-items:flex-end;}
.need-row{display:flex;align-items:center;gap:5px;}
.need-icon{font-size:.9rem;}
.need-bar{width:40px;height:4px;background:var(--dim2);border-radius:2px;overflow:hidden;}
.need-fill{height:100%;border-radius:2px;transition:width .5s;}
.need-fill.hunger{background:var(--orange);}
.need-fill.energy{background:var(--yellow);}
.need-fill.happy{background:var(--pink);}
.need-fill.health{background:var(--green);}
.need-fill.social{background:var(--ice2);}
.need-fill.fun{background:#cc88ff;}

/* ── EYES ── */
#eyes-wrap{position:relative;display:flex;align-items:center;justify-content:center;gap:clamp(18px,7vw,44px);z-index:10;transition:transform .5s cubic-bezier(.34,1.56,.64,1);}
.eye{position:relative;width:clamp(95px,26vw,130px);height:clamp(95px,26vw,130px);border-radius:20px;background:#000;border:2.5px solid var(--ice3);overflow:hidden;box-shadow:0 0 28px rgba(126,207,255,.18),inset 0 0 18px rgba(0,0,0,.8);transition:border-color .3s,box-shadow .3s;}
.eye canvas{position:absolute;inset:0;width:100%;height:100%;}
.eye.glow{border-color:var(--ice2);box-shadow:0 0 40px rgba(126,207,255,.4),inset 0 0 18px rgba(0,0,0,.8);}

/* ── FOOD ANIMATION ── */
.food-drop{position:absolute;font-size:1.8rem;z-index:80;pointer-events:none;transition:all .5s cubic-bezier(.2,1.4,.6,1);animation:foodFall .6s ease forwards;}
#food-area{position:absolute;bottom:0;left:0;right:0;height:60px;z-index:70;pointer-events:none;}

/* ── BUBBLE ── */
#bubble{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);max-width:82%;background:var(--bg2);border:1px solid var(--dim);border-radius:14px;padding:11px 16px;font-size:.76rem;color:var(--text);line-height:1.6;text-align:center;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none;}
#bubble.show{opacity:1;}
#bubble::after{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:7px solid var(--dim);}

/* ── BOTTOM HUD ── */
#hud{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-around;padding:14px 20px;padding-bottom:max(14px,env(safe-area-inset-bottom));z-index:60;}
.hud-btn{background:none;border:1px solid var(--dim2);border-radius:10px;color:var(--dim);font-family:'Courier New',monospace;font-size:.56rem;padding:7px 11px;cursor:pointer;transition:all .2s;letter-spacing:.08em;}
.hud-btn:hover{border-color:var(--ice2);color:var(--ice2);}
.hud-gesture{font-size:.6rem;color:var(--dim);letter-spacing:.1em;display:flex;align-items:center;gap:5px;}
.mic-bars{display:flex;gap:2px;align-items:flex-end;height:12px;}
.mb{width:3px;background:var(--dim);border-radius:1px;transition:height .1s,background .2s;}
.mb.on{background:var(--ice2);}

/* hidden */
#bg-cam{position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;}

/* ── SLEEP ZZZ ── */
.zzz{position:absolute;font-size:1.2rem;animation:floatUp 2s ease forwards;pointer-events:none;z-index:70;}

/* ══ KEYFRAMES ══ */
@keyframes dp{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes pop{0%{transform:scale(.4);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
@keyframes bounce{0%,100%{transform:translateY(0);}40%{transform:translateY(-14px);}70%{transform:translateY(-5px);}}
@keyframes wiggle{0%,100%{transform:rotate(0);}25%{transform:rotate(-8deg);}75%{transform:rotate(8deg);}}
@keyframes shakeX{0%,100%{transform:translateX(0);}25%{transform:translateX(-9px);}75%{transform:translateX(9px);}}
@keyframes hb{0%,100%{transform:scale(1);}15%{transform:scale(1.08);}30%{transform:scale(1);}}
@keyframes foodFall{0%{transform:translateY(-40px) scale(.5);opacity:0;}60%{transform:translateY(8px) scale(1.1);opacity:1;}100%{transform:translateY(0) scale(1);opacity:1;}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-60px);}}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="box">
    <div class="logo">VEX</div>
    <div class="sub">ROBÔ COMPANHEIRO</div>
    <div class="step"><div class="sn">1</div><span>Acesse <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a></span></div>
    <div class="step"><div class="sn">2</div><span>Crie uma chave <code style="color:var(--ice2)">gsk_...</code></span></div>
    <div class="step"><div class="sn">3</div><span>Cole abaixo e acorde o VEX</span></div>
    <input type="password" class="inp" id="key-inp" placeholder="gsk_..." autocomplete="off"/>
    <button class="btn" onclick="activateKey()">— ACORDAR VEX —</button>
    <div class="hint">🔒 salvo só no seu celular</div>
  </div>
</div>

<!-- ONBOARD -->
<div id="onboard">
  <div class="box">
    <div class="ob-icon" id="ob-icon">🤖</div>
    <div class="ob-msg" id="ob-msg">Olá!</div>
    <div id="cam-wrap"><video id="cam-video" autoplay playsinline muted></video></div>
    <div id="cam-st"></div>
    <div class="prog" id="ob-prog"><div class="prog-fill" id="ob-fill"></div></div>
    <div id="name-wrap"><input type="text" class="inp" id="name-inp" placeholder="Qual é o seu nome?" maxlength="22" onkeydown="if(event.key==='Enter')submitName()"/></div>
    <button class="btn" id="ob-btn" onclick="obNext()">CONTINUAR →</button>
    <button class="btn sec" id="ob-skip" onclick="skipCam()" style="display:none">pular câmera</button>
  </div>
</div>

<!-- GREET -->
<div id="greet">
  <div class="box">
    <div class="gr-face" id="gr-face">🤖</div>
    <div class="gr-name" id="gr-name">OLÁ!</div>
    <div class="gr-txt" id="gr-txt"></div>
    <button class="btn" onclick="enterPet()">ENTRAR →</button>
  </div>
</div>

<!-- PET -->
<div id="pet">
  <div class="bg-glow" id="bg-glow"></div>

  <!-- status -->
  <div id="sbar">
    <div class="sb-left">
      <div class="sb-name">VEX</div>
      <div class="sb-st"><div class="sdot"></div><span id="st-txt">ACORDANDO...</span></div>
    </div>
  </div>

  <!-- needs icons -->
  <div id="needs">
    <div class="need-row"><div class="need-icon">🍖</div><div class="need-bar"><div class="need-fill hunger" id="n-hunger" style="width:80%"></div></div></div>
    <div class="need-row"><div class="need-icon">⚡</div><div class="need-bar"><div class="need-fill energy" id="n-energy" style="width:100%"></div></div></div>
    <div class="need-row"><div class="need-icon">😊</div><div class="need-bar"><div class="need-fill happy"  id="n-happy"  style="width:90%"></div></div></div>
    <div class="need-row"><div class="need-icon">❤️</div><div class="need-bar"><div class="need-fill health" id="n-health" style="width:100%"></div></div></div>
    <div class="need-row"><div class="need-icon">👥</div><div class="need-bar"><div class="need-fill social" id="n-social" style="width:70%"></div></div></div>
    <div class="need-row"><div class="need-icon">🎮</div><div class="need-bar"><div class="need-fill fun"    id="n-fun"    style="width:85%"></div></div></div>
  </div>

  <!-- eyes -->
  <div id="eyes-wrap">
    <div class="eye" id="eye-l"><canvas id="cvl"></canvas></div>
    <div class="eye" id="eye-r"><canvas id="cvr"></canvas></div>
  </div>

  <!-- food area -->
  <div id="food-area"></div>

  <!-- bubble -->
  <div id="bubble"><span id="bub-txt"></span></div>

  <!-- hud -->
  <div id="hud">
    <div class="hud-gesture">
      <div class="mic-bars">
        <div class="mb" id="mb0" style="height:3px"></div>
        <div class="mb" id="mb1" style="height:6px"></div>
        <div class="mb" id="mb2" style="height:4px"></div>
        <div class="mb" id="mb3" style="height:8px"></div>
        <div class="mb" id="mb4" style="height:3px"></div>
      </div>
      <span id="mic-txt">OUVINDO</span>
    </div>
    <button class="hud-btn" onclick="feedVex()">🍖 DAR COMIDA</button>
    <button class="hud-btn" onclick="petVex()">🤝 CARINHO</button>
    <button class="hud-btn" onclick="resetVex()" style="font-size:.5rem">RESET</button>
  </div>

  <video id="bg-cam" autoplay playsinline muted></video>
</div>

<script>
/* ═══ GROQ ═══ */
const GROQ = 'https://api.groq.com/openai/v1/chat/completions';
const MDL  = 'llama-3.3-70b-versatile';

/* ═══ STATE ═══ */
let apiKey='', userName='', history=[], busy=false;
let obStep='name', camStream=null, bgCam=null;

/* ═══ NEEDS ═══ */
const needs = { hunger:80, energy:100, happy:90, health:100, social:70, fun:85 };
const NEED_DECAY = { hunger:-0.8, energy:-0.4, happy:-0.3, health:0, social:-0.5, fun:-0.4 };

/* ═══ SLEEP / EMOTION ═══ */
let emotion='idle', sleeping=false, yawning=false;
let lastInteraction=Date.now(), sleepTimer=null, bubbleTimer=null, autoTimer=null;
const SLEEP_AFTER = 5 * 60 * 1000; // 5 min

/* ═══ SENSORS ═══ */
let faceVisible=false, motionLevel=0, soundLevel=0;
let prevFrame=null, faceCtx=null, faceCanvas=null;
let audioCtx=null, analyser=null;
let recognition=null;

/* ═══ HAND TRACKING ═══ */
let handX=0.5, handY=0.5, handOpen=true, prevHandOpen=true;
let handVisible=false, throwGesture=false;
let handTrackCanvas=null, handTrackCtx=null;
let skinThreshold=40;

/* ═══ EYE STATE ═══ */
const ES = { lx:0,ly:0,tlx:0,tly:0, lid:0,tlid:0, squint:0, heart:false, xEye:false, spinning:false, spinA:0, scaleY:1 };
const CTX = {};

/* ═══ FOODS ═══ */
const FOODS = [
  {e:'🍕',n:'pizza',    h:+25,en:+15,hp:+5, fx:'[animado] PIZZA! Meu sensor de carboidrato explodiu! 🍕'},
  {e:'🥦',n:'brócolis', h:+20,en:+10,hp:+20,fx:'[triste] Brócolis... VEX processa... aceitando com dignidade. 🥦'},
  {e:'🍎',n:'maçã',     h:+15,en:+12,hp:+15,fx:'[feliz] Maçã! Boa escolha. Meus circuitos aprovam! 🍎'},
  {e:'🍫',n:'chocolate',h:+30,en:+25,hp:-5, fx:'[animado] CHOCOLATE!! Protocolo de euforia ativado!! 🍫✨'},
  {e:'🍣',n:'sushi',    h:+20,en:+15,hp:+10,fx:'[surpreso] Sushi?! Você me trata bem demais. Posso chamar você de melhor amigo? 🍣'},
  {e:'🍩',n:'rosquinha',h:+25,en:+20,hp:-3, fx:'[travesso] Rosquinha! Prometo que só como uma... eram duas. 🍩'},
  {e:'🥕',n:'cenoura',  h:+12,en:+8, hp:+18,fx:'[pensando] Cenoura... processando... okay, minha visão noturna melhorou. 🥕'},
  {e:'🍔',n:'burger',   h:+30,en:+20,hp:-8, fx:'[animado] BURGER! Hoje é dia de tratar bem o VEX! 🍔🔥'},
  {e:'🍌',n:'banana',   h:+15,en:+18,hp:+8, fx:'[feliz] Banana! Energia rápida. Minha esteira agradece! 🍌'},
  {e:'🧁',n:'cupcake',  h:+20,en:+15,hp:-2, fx:'[apaixonado] Cupcake... isso é amor. Você sabe o que eu gosto. 🧁❤️'},
];

/* ═══ SYSTEM PROMPT ═══ */
function buildSys() {
  const ns = Object.entries(needs).map(([k,v])=>`${k}:${v.toFixed(0)}%`).join(', ');
  return `Você é VEX, um robô companheiro de mesa — tipo Loona/Tamagotchi com IA.
${userName?`Seu amigo é ${userName}.`:''}

NECESSIDADES ATUAIS: ${ns}

PERSONALIDADE: Brincalhão, travesso mas carinhoso. Age como pet robótico autônomo.
Reaja conforme as necessidades — com fome fica impaciente, cansado fica lerdo, feliz fica animado.

FORMATO: sempre comece com [emoção] — opções: [feliz][animado][curioso][surpreso][pensando][triste][bravo][dormindo][apaixonado][travesso][entediado]
Respostas CURTÍSSIMAS — máx 1-2 frases. Você é um pet, não um professor.`;
}

/* ═══ BOOT ═══ */
window.onload=()=>{
  const k=localStorage.getItem('vex_k'), n=localStorage.getItem('vex_n'), h=localStorage.getItem('vex_h');
  if(k){ apiKey=k; userName=n||''; if(h){try{history=JSON.parse(h);}catch(e){}} if(!userName) showOnboard(); else showGreet(); }
};

/* ═══ SETUP ═══ */
function activateKey(){
  const v=document.getElementById('key-inp').value.trim();
  const el=document.getElementById('key-inp');
  if(!v.startsWith('gsk_')){el.classList.add('err');setTimeout(()=>el.classList.remove('err'),2000);return;}
  apiKey=v; localStorage.setItem('vex_k',v);
  document.getElementById('setup').style.display='none'; showOnboard();
}

/* ═══ ONBOARD ═══ */
function showOnboard(){
  obStep='name';
  document.getElementById('ob-icon').textContent='🤖';
  document.getElementById('ob-msg').innerHTML=`<strong style="color:#7ecfff">Oi! Eu sou VEX.</strong><br>Seu novo companheiro robótico.<br>Como posso te chamar?`;
  document.getElementById('name-wrap').style.display='block';
  document.getElementById('ob-btn').textContent='CONTINUAR →';
  document.getElementById('cam-wrap').style.display='none';
  document.getElementById('cam-st').style.display='none';
  document.getElementById('ob-prog').style.display='none';
  document.getElementById('ob-skip').style.display='none';
  document.getElementById('onboard').style.display='flex';
  setTimeout(()=>document.getElementById('name-inp').focus(),300);
}
function obNext(){ if(obStep==='name')submitName(); else if(obStep==='camera')captureFace(); else{document.getElementById('onboard').style.display='none';showGreet();} }
function submitName(){
  const n=document.getElementById('name-inp').value.trim();
  if(!n){document.getElementById('name-inp').classList.add('err');setTimeout(()=>document.getElementById('name-inp').classList.remove('err'),1500);return;}
  userName=n; localStorage.setItem('vex_n',n); obStep='camera';
  document.getElementById('ob-icon').textContent='📸';
  document.getElementById('ob-msg').innerHTML=`Legal, <strong style="color:#7ecfff">${n}</strong>! 🤟<br>Deixa eu guardar seu rosto!`;
  document.getElementById('name-wrap').style.display='none';
  document.getElementById('ob-btn').textContent='📸 CAPTURAR';
  document.getElementById('ob-skip').style.display='block';
  startObCam();
}
async function startObCam(){
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    document.getElementById('cam-video').srcObject=camStream;
    document.getElementById('cam-wrap').style.display='block';
    document.getElementById('cam-st').style.display='block';
    document.getElementById('cam-st').textContent='● CÂMERA ATIVA';
  }catch(e){document.getElementById('ob-msg').innerHTML=`Câmera bloqueada 😅<br>Sem problema!`;obStep='done';document.getElementById('ob-btn').textContent='CONTINUAR →';}
}
async function captureFace(){
  const v=document.getElementById('cam-video');
  if(!v.srcObject){skipCam();return;}
  document.getElementById('ob-btn').disabled=true; document.getElementById('ob-btn').textContent='MEMORIZANDO...';
  document.getElementById('ob-prog').style.display='block';
  let p=0; const iv=setInterval(()=>{p=Math.min(p+4,100);document.getElementById('ob-fill').style.width=p+'%';if(p>=100)clearInterval(iv);},40);
  await new Promise(r=>setTimeout(r,1200));
  const c=document.createElement('canvas'); c.width=c.height=160;
  const x=c.getContext('2d'); x.save(); x.scale(-1,1); x.drawImage(v,-160,0,160,160); x.restore();
  localStorage.setItem('vex_face',c.toDataURL('image/jpeg',.5));
  clearInterval(iv); stopObCam(); document.getElementById('onboard').style.display='none'; showGreet();
}
function skipCam(){stopObCam();document.getElementById('onboard').style.display='none';showGreet();}
function stopObCam(){if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}}

/* ═══ GREET ═══ */
const GREETS=[
  n=>`Ei, ${n}! Finalmente! Minha esteira deu 47 voltas de ansiedade. 😄`,
  n=>`${n}! Finge que não tava esperando... mas tava. Muito. 👀`,
  n=>`${n} identificado! Iniciando protocolo "ser fofo mas travesso". ⚡`,
  n=>`Opa, ${n}! Meus sensores de amizade estão no máximo! 🤖❤️`,
];
async function showGreet(){
  const name=userName||'você', txt=GREETS[Math.floor(Math.random()*GREETS.length)](name);
  const fd=localStorage.getItem('vex_face');

/* ═══ EYE CANVAS ═══ */
function initEyes(){
  ['l','r'].forEach(s=>{
    const cv=document.getElementById(`cv${s}`), ey=document.getElementById(`eye-${s}`);
    cv.width=ey.offsetWidth||120; cv.height=ey.offsetHeight||120;
    CTX[s]=cv.getContext('2d');
  });
  requestAnimationFrame(renderEyes);
}

function renderEyes(){
  requestAnimationFrame(renderEyes);
  ES.lx+=(ES.tlx-ES.lx)*.09; ES.ly+=(ES.tly-ES.ly)*.09;
  ES.lid+=(ES.tlid-ES.lid)*.14;
  if(ES.spinning){ES.spinA+=5;const r=10;ES.tlx=Math.cos(ES.spinA*Math.PI/180)*r;ES.tly=Math.sin(ES.spinA*Math.PI/180)*r;}

  ['l','r'].forEach(s=>{
    const ctx=CTX[s], W=ctx.canvas.width, H=ctx.canvas.height, cx=W/2, cy=H/2;
    ctx.clearRect(0,0,W,H);
    if(ES.xEye){ drawX(ctx,cx,cy,W); return; }
    if(ES.heart){ drawHeart(ctx,cx,cy,W*.22); return; }

    const pw=W*.26, ph=ES.squint>.5?pw*.25:pw*(1-ES.squint*.4);
    const px=cx+ES.lx, py=cy+ES.ly;

    // iris glow
    const g=ctx.createRadialGradient(px-pw*.2,py-ph*.2,pw*.05,px,py,pw*.95);
    g.addColorStop(0,'rgba(210,240,255,.97)'); g.addColorStop(.35,'#6fb3e8'); g.addColorStop(1,'#1a4a7a');
    ctx.shadowColor='#7ecfff'; ctx.shadowBlur=12;
    rrect(ctx,cx-pw*.92,cy-ph*.92,pw*1.84,ph*1.84,pw*.32);
    ctx.fillStyle=g; ctx.fill(); ctx.shadowBlur=0;

    // pupil
    ctx.fillStyle='#030c18';
    rrect(ctx,px-pw*.4,py-ph*.4,pw*.8,ph*.8,pw*.16); ctx.fill();

    // highlight
    ctx.fillStyle='rgba(255,255,255,.88)';
    ctx.beginPath(); ctx.ellipse(px-pw*.2,py-ph*.22,pw*.15,ph*.11,-.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.35)';
    ctx.beginPath(); ctx.ellipse(px+pw*.17,py+ph*.1,pw*.07,ph*.06,0,0,Math.PI*2); ctx.fill();

    // eyelid blink
    if(ES.lid>.01){
      const lh=H*ES.lid;
      ctx.fillStyle='#060a0f';
      ctx.fillRect(0,0,W,lh); ctx.fillRect(0,H-lh,W,lh);
    }
  });
}

function drawX(ctx,cx,cy,W){
  ctx.strokeStyle='#ff5f6d'; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.shadowColor='#ff5f6d'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.moveTo(cx-22,cy-22); ctx.lineTo(cx+22,cy+22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+22,cy-22); ctx.lineTo(cx-22,cy+22); ctx.stroke();
  ctx.shadowBlur=0;
}
function drawHeart(ctx,cx,cy,s){
  ctx.save(); ctx.fillStyle='#ff6090'; ctx.shadowColor='#ff6090'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.moveTo(cx,cy+s*.4);
  ctx.bezierCurveTo(cx-s*1.2,cy-s*.3,cx-s*1.4,cy-s*1.1,cx,cy-s*.4);
  ctx.bezierCurveTo(cx+s*1.4,cy-s*1.1,cx+s*1.2,cy-s*.3,cx,cy+s*.4);
  ctx.fill(); ctx.restore();
}
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ═══ EMOTION SYSTEM ═══ */
const EMMAP={feliz:'feliz',animado:'animado',curioso:'curioso',surpreso:'surpreso',pensando:'pensando',triste:'triste',bravo:'bravo',dormindo:'dormindo',apaixonado:'apaixonado',travesso:'travesso',entediado:'entediado',happy:'feliz',excited:'animado',curious:'curioso',surprised:'surpreso',thinking:'pensando',sad:'triste',angry:'bravo',sleeping:'dormindo',love:'apaixonado',playful:'travesso',bored:'entediado'};

function setEmotion(em){
  if(sleeping && em!=='dormindo' && em!=='surpreso') return;
  emotion=em;
  ES.heart=false; ES.xEye=false; ES.spinning=false;
  switch(em){
    case 'feliz':     ES.squint=.28; ES.tlid=0; break;
    case 'animado':   ES.squint=0;   ES.tlid=0; ES.spinning=true; setTimeout(()=>{ES.spinning=false;lookC();},900); break;
    case 'curioso':   ES.squint=.1;  ES.tlid=.15; lookAt(8,-5); break;
    case 'surpreso':  ES.squint=0;   ES.tlid=0; break;
    case 'pensando':  ES.squint=.2;  ES.tlid=.22; lookAt(-10,-6); break;
    case 'triste':    ES.squint=.55; ES.tlid=.32; lookAt(0,8); break;
    case 'bravo':     ES.squint=0;   ES.tlid=.25; ES.xEye=true; setTimeout(()=>{ES.xEye=false;setEmotion('feliz');},1000); break;
    case 'dormindo':  ES.squint=0;   ES.tlid=.95; lookC(); break;
    case 'apaixonado':ES.squint=0;   ES.tlid=0; ES.heart=true; setTimeout(()=>{ES.heart=false;setEmotion('feliz');},2200); break;
    case 'travesso':  ES.squint=.32; ES.tlid=.08; lookAt(6,0); break;
    case 'entediado': ES.squint=.6;  ES.tlid=.42; lookAt(0,10); break;
  }
  animEyes(em); updateGlow(em);
}

function animEyes(em){
  const w=document.getElementById('eyes-wrap'); w.style.animation='none'; void w.offsetWidth;
  if(em==='animado')   w.style.animation='bounce .5s ease';
  if(em==='bravo')     w.style.animation='shakeX .4s ease';
  if(em==='travesso')  w.style.animation='wiggle .4s ease';
  if(em==='surpreso')  w.style.animation='hb .4s ease';
}

function updateGlow(em){
  const C={animado:'rgba(126,207,255,.14)',apaixonado:'rgba(255,100,150,.1)',bravo:'rgba(255,80,80,.08)',triste:'rgba(50,80,130,.07)',dormindo:'rgba(30,50,80,.05)',entediado:'rgba(50,70,90,.05)'};
  document.getElementById('bg-glow').style.background=`radial-gradient(circle,${C[em]||'rgba(126,207,255,.07)'} 0%,transparent 70%)`;
}

function lookAt(x,y){ES.tlx=x;ES.tly=y;}
function lookC(){ES.tlx=0;ES.tly=0;}
function blink(){ES.tlid=1;setTimeout(()=>ES.tlid=0,130);}

setInterval(()=>{

function decayNeeds(){

async function startSensors(){

async function startBgCam(){
  try{
    bgCam=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:160,height:120},audio:false});
    const v=document.getElementById('bg-cam'); v.srcObject=bgCam;
    faceCanvas=document.createElement('canvas'); faceCanvas.width=160; faceCanvas.height=120;
    faceCtx=faceCanvas.getContext('2d');
    // Hand tracking canvas
    handTrackCanvas=document.createElement('canvas'); handTrackCanvas.width=160; handTrackCanvas.height=120;
    handTrackCtx=handTrackCanvas.getContext('2d');
    setInterval(analyzeFrame,200);
  }catch(e){ console.log('Câmera bg não disponível'); }
}

function analyzeFrame(){
  const v=document.getElementById('bg-cam');
  if(!faceCtx||v.readyState<2) return;

  faceCtx.drawImage(v,0,0,160,120);
  const cur=faceCtx.getImageData(0,0,160,120);
  const d=cur.data;

  // Motion detection
  if(prevFrame){
    let diff=0;
    for(let i=0;i<d.length;i+=16) diff+=Math.abs(d[i]-prevFrame[i]);
    motionLevel=Math.min(100,diff/400);
    if(motionLevel>45&&!busy&&!sleeping) onMotion(motionLevel);
  }
  prevFrame=new Uint8ClampedArray(d);

  // Face detection (brightness center)
  let br=0,cnt=0;
  for(let y=30;y<90;y+=4) for(let x=50;x<110;x+=4){ const i=(y*160+x)*4; br+=(d[i]+d[i+1]+d[i+2])/3; cnt++; }
  br/=cnt;
  const nf=br>35&&br<235;
  if(nf&&!faceVisible){ faceVisible=true; onFaceAppear(); }
  else if(!nf&&faceVisible){ faceVisible=false; onFaceDisappear(); }

  // Hand/skin detection
  detectHand(d);
}

function detectHand(d){
  // Detect skin-colored region and estimate hand position + openness
  let skinPixels=[], minX=160,maxX=0,minY=120,maxY=0, totalX=0,totalY=0;
  for(let y=0;y<120;y+=3) for(let x=0;x<160;x+=3){
    const i=(y*160+x)*4;
    const r=d[i],g=d[i+1],b=d[i+2];
    // Simple skin detection
    if(r>90&&g>50&&b>30&&r>g&&r>b&&(r-g)>10&&r<250){
      skinPixels.push({x,y});
      if(x<minX)minX=x; if(x>maxX)maxX=x;
      if(y<minY)minY=y; if(y>maxY)maxY=y;
      totalX+=x; totalY+=y;
    }
  }

  if(skinPixels.length>30){
    handVisible=true;
    handX=(totalX/skinPixels.length)/160;
    handY=(totalY/skinPixels.length)/120;
    const spanX=maxX-minX, spanY=maxY-minY;
    const wasOpen=handOpen;
    // Open hand = wide span, closed fist = compact
    handOpen = spanX>35||spanY>35;

    // Detect throw gesture: was closed, now open (throw!)
    if(!wasOpen&&handOpen&&!busy){
      throwGesture=true;
      feedVex();
      setTimeout(()=>throwGesture=false,1000);
    }

    // VEX follows hand with eyes
    const ex=(handX-.5)*26, ey=(handY-.5)*18;
    lookAt(ex,ey);

    if(!sleeping&&emotion!=='apaixonado'){
      setEmotion(handOpen?'curioso':'animado');
    }
    lastInteraction=Date.now();
  } else {
    handVisible=false;
  }
}

async function startMic(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser(); analyser.fftSize=256;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    setInterval(analyzeMic,300);
    animMicBars();
  }catch(e){}
}

function analyzeMic(){
  if(!analyser) return;
  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  soundLevel=Math.min(100,data.slice(0,20).reduce((a,b)=>a+b,0)/20);
  // Wake from sleep on loud sound
  if(sleeping&&soundLevel>55){ wakeUp(); lastInteraction=Date.now(); }
  if(soundLevel>60&&!busy&&!sleeping) onLoudSound(soundLevel);
}

function animMicBars(){
  requestAnimationFrame(animMicBars);
  if(!analyser) return;
  const d=new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(d);
  [0,1,2,3,4].forEach((i,j)=>{ const h=Math.max(2,Math.min(16,d[j*2]/10)); const b=document.getElementById(`mb${j}`); if(b){b.style.height=h+'px';b.classList.toggle('on',h>7);} });
}

    const data=await res.json();

/* ═══ SPEECH REC ═══ */
function setupSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  recognition=new SR(); recognition.lang='pt-BR'; recognition.continuous=true; recognition.interimResults=false;
  recognition.onresult=async e=>{
    const txt=e.results[e.results.length-1][0].transcript.trim();
    if(!txt||busy) return;
    lastInteraction=Date.now();
    if(sleeping) wakeUp();
    setSt('TE OUVI! 🎙️'); setEmotion('curioso');
    await respondSpeech(txt);
  };
  recognition.onerror=e=>{if(e.error!=='no-speech')setTimeout(()=>{try{recognition.start();}catch(e){}},1000);};
  recognition.onend=()=>{setTimeout(()=>{try{recognition.start();}catch(e){}},500);};
  try{recognition.start();}catch(e){}
}

async function respondSpeech(txt){
  if(busy) return; busy=true;
  showBubble('...'); setEmotion('pensando');
  history.push({role:'user',content:txt});
  try{
    const res=await fetch(GROQ,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({model:MDL,messages:[{role:'system',content:buildSys()},...history.slice(-10)],temperature:.92,max_tokens:90})});
    const data=await res.json();
    if(!data.error){
      let r=data.choices[0].message.content;
      const m=r.match(/^\[(\w+)\]/); const mood=m?EMMAP[m[1].toLowerCase()]||'feliz':'feliz';
      r=r.replace(/^\[\w+\]\s*/,'');
      setEmotion(mood); showBubble(r);
      history.push({role:'assistant',content:data.choices[0].message.content});
      if(history.length>20) history=history.slice(-20);
      localStorage.setItem('vex_h',JSON.stringify(history));
    }
  }catch(e){showBubble('⚠️ Sem conexão!');}
  busy=false; setSt('OBSERVANDO');
}

/* ═══ BUBBLE ═══ */
function showBubble(txt){
  clearTimeout(bubbleTimer);
  const b=document.getElementById('bubble'), el=document.getElementById('bub-txt');
  el.textContent=''; b.classList.add('show');
  let i=0; const iv=setInterval(()=>{ if(i<txt.length){el.textContent+=txt[i];i++;}else clearInterval(iv); },16);
  bubbleTimer=setTimeout(()=>b.classList.remove('show'),8000);
}

function playBeep(freqs=[880]){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    freqs.forEach((f,i)=>{
      const o=ac.createOscillator(), g=ac.createGain();
      o.connect(g); g.connect(ac.destination); o.frequency.value=f; o.type='sine';
      g.gain.setValueAtTime(.1,ac.currentTime+i*.1);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.1+.14);
      o.start(ac.currentTime+i*.1); o.stop(ac.currentTime+i*.1+.14);
    });
  }catch(e){}
}

function setSt(t){document.getElementById('st-txt').textContent=t;}

function resetVex(){
  if(!confirm('Resetar VEX completamente?')) return;
  ['vex_k','vex_n','vex_face','vex_h'].forEach(k=>localStorage.removeItem(k));
  location.reload();
}

window.addEventListener('resize',()=>{
  ['l','r'].forEach(s=>{ const cv=document.getElementById(`cv${s}`), ey=document.getElementById(`eye-${s}`); if(cv&&ey){cv.width=ey.offsetWidth;cv.height=ey.offsetHeight;} });
});
</script>
